<!DOCTYPE html>
<html lang="nl">
<head><meta charset="UTF-8"><title>Stripe Checkout Test</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>body{font-family:monospace;padding:20px;background:#111;color:#0f0;font-size:14px;white-space:pre-wrap;}button{padding:12px 20px;margin:6px;background:#333;color:#fff;border:1px solid #555;}</style>
</head>
<body>
<h2>Stripe Checkout: directe test per plan</h2>
<button onclick="test('starter')">Test Starter</button>
<button onclick="test('pro')">Test Pro</button>
<button onclick="test('business')">Test Business</button>
<div id="out" style="margin-top:20px;"></div>
<script>
async function test(plan){
  const out=document.getElementById('out');
  out.textContent='Bezig met testen van "'+plan+'"...';
  try{
    const res=await fetch('https://kronr-stripe.isaak-elia.workers.dev/create-checkout',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({salon_id:'test-salon-id',plan,email:'test@test.nl'})
    });
    const text=await res.text();
    out.textContent='Statusus: '+res.status+' '+res.statusText+'\n\nRaw body:\n'+text;
  }catch(e){
    out.textContent='FETCH FOUT: '+e.name+' - '+e.message;
  }
}
</script>
</body>
</html>
