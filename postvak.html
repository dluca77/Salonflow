<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postvak IN | Kronr</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#0f0d0b;--mu:#6b6058;--mu2:#a09890;--iv:#faf8f4;--bd:#e2d9ce;--gd:#8c6d3f;--wh:#ffffff;--red:#c0392b;--green:#2d6a4f;}
body{font-family:'Inter',sans-serif;background:var(--iv);min-height:100vh;opacity:0;transition:opacity .2s;}
.topbar{min-height:60px;background:var(--wh);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:10px 24px;position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:10px;row-gap:8px;}
@media(max-width:700px){
  .topbar{padding:10px 14px;}
  .topbar .tabs{order:3;width:100%;justify-content:center;}
}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:var(--ink);}
.logo em{color:var(--gd);font-style:normal;}
.uitloggen{font-size:13px;color:var(--mu);cursor:pointer;background:none;border:none;font-family:inherit;}
.tab-knop{font-size:13px;font-weight:600;color:var(--mu);cursor:pointer;background:none;border:none;font-family:inherit;padding:8px 14px;border-radius:8px;}
.tab-knop.actief{background:var(--iv);color:var(--ink);}
.tab-knop:hover:not(.actief){background:var(--iv);}
.layout{display:grid;grid-template-columns:340px 1fr;max-width:1200px;margin:0 auto;min-height:calc(100vh - 60px);}
.lijst{border-right:1px solid var(--bd);background:var(--wh);overflow-y:auto;}
.lijst-item{padding:16px 20px;border-bottom:1px solid var(--bd);cursor:pointer;}
.lijst-item:hover{background:var(--iv);}
.lijst-item.actief{background:var(--iv);border-left:3px solid var(--gd);}
.lijst-item.ongelezen .li-van{font-weight:700;}
.li-van{font-size:14px;color:var(--ink);margin-bottom:2px;}
.li-onderwerp{font-size:13px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-datum{font-size:11px;color:var(--mu2);margin-top:4px;}
.detail{padding:32px;}
.detail-leeg{padding:60px 32px;text-align:center;color:var(--mu2);font-size:14px;}
.detail-onderwerp{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:var(--ink);margin-bottom:8px;}
.detail-van{font-size:13px;color:var(--mu);margin-bottom:24px;}
.detail-inhoud{font-size:14.5px;color:#2a2420;line-height:1.7;white-space:pre-wrap;background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:20px;margin-bottom:24px;}
.reply-box textarea{width:100%;min-height:140px;border:1px solid var(--bd);border-radius:10px;padding:14px;font-family:inherit;font-size:14px;resize:vertical;}
.btn-reply{margin-top:10px;padding:11px 22px;background:var(--ink);color:var(--wh);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-reply:disabled{opacity:.5;cursor:default;}
.reply-msg{font-size:13px;margin-top:10px;display:none;}
.reply-msg.fout{color:var(--red);}
.reply-msg.ok{color:var(--green);}
@media(max-width:800px){
  .layout{grid-template-columns:1fr;}
  .lijst{display:none;}
  .lijst.toon-mobiel{display:block;}
  .detail{display:none;}
  .detail.toon-mobiel{display:block;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Kronr<em>.</em></div>
  <div class="tabs" style="display:flex;gap:4px;">
    <button class="tab-knop actief" id="tab-in" onclick="wisselTab('in')">Postvak IN</button>
    <button class="tab-knop" id="tab-uit" onclick="wisselTab('uit')">Postvak UIT</button>
    <button class="tab-knop" id="tab-archief" onclick="wisselTab('archief')">Archief</button>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <a href="admin.html" class="uitloggen" style="text-decoration:none;">Beheer</a>
    <button onclick="toonNieuwBericht()" style="font-size:13px;font-weight:600;color:var(--wh);background:var(--ink);border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;">+ Nieuw bericht</button>
    <button class="uitloggen" onclick="toonInstellingen()">Instellingen</button>
    <button class="uitloggen" onclick="uitloggen()">Uitloggen</button>
  </div>
</div>

<div class="layout">
  <div class="lijst toon-mobiel" id="lijst">
    <div style="padding:24px;text-align:center;color:var(--mu2);font-size:12px;">Laden...</div>
  </div>
  <div class="detail" id="detail">
    <div class="detail-leeg">Selecteer een bericht om te lezen.</div>
  </div>
</div>

<!-- Instellingen-scherm -->
<div id="instellingen-overlay" style="display:none;position:fixed;inset:0;background:rgba(15,13,11,.4);z-index:100;align-items:center;justify-content:center;padding:24px;">
  <div style="background:var(--wh);border-radius:14px;padding:28px;max-width:420px;width:100%;">
    <div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:800;color:var(--ink);margin-bottom:16px;">Instellingen</div>
    <label style="font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block;">Jouw naam</label>
    <p style="font-size:12.5px;color:var(--mu);margin-bottom:8px;">Verstuurde mail gebruikt automatisch de Kronr-huisstijl (zoals de bevestigingsmails), met "— [jouw naam], Kronr" onderaan.</p>
    <input type="text" id="naam-tekst" style="width:100%;border:1px solid var(--bd);border-radius:8px;padding:11px 12px;font-family:inherit;font-size:13px;" placeholder="Bijv. Isaak">
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button onclick="slaNaamOp()" style="flex:1;padding:11px;background:var(--ink);color:var(--wh);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Opslaan</button>
      <button onclick="sluitInstellingen()" style="padding:11px 18px;background:none;border:1px solid var(--bd);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;">Sluiten</button>
    </div>
    <div class="reply-msg" id="instellingen-msg" style="margin-top:10px;"></div>
  </div>
</div>

<!-- Nieuw bericht -->
<div id="nieuw-bericht-overlay" style="display:none;position:fixed;inset:0;background:rgba(15,13,11,.4);z-index:100;align-items:center;justify-content:center;padding:24px;">
  <div style="background:var(--wh);border-radius:14px;padding:28px;max-width:480px;width:100%;">
    <div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:800;color:var(--ink);margin-bottom:16px;">Nieuw bericht</div>
    <label style="font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block;">Aan</label>
    <input type="email" id="nb-naar" style="width:100%;border:1px solid var(--bd);border-radius:8px;padding:11px 12px;font-family:inherit;font-size:13px;margin-bottom:14px;" placeholder="naam@voorbeeld.nl">
    <label style="font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block;">Onderwerp</label>
    <input type="text" id="nb-onderwerp" style="width:100%;border:1px solid var(--bd);border-radius:8px;padding:11px 12px;font-family:inherit;font-size:13px;margin-bottom:14px;">
    <label style="font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block;">Bericht</label>
    <textarea id="nb-inhoud" style="width:100%;min-height:140px;border:1px solid var(--bd);border-radius:8px;padding:12px;font-family:inherit;font-size:13px;resize:vertical;"></textarea>
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button onclick="verstuurNieuwBericht()" id="nb-btn" style="flex:1;padding:11px;background:var(--ink);color:var(--wh);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Versturen</button>
      <button onclick="sluitNieuwBericht()" style="padding:11px 18px;background:none;border:1px solid var(--bd);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;">Annuleren</button>
    </div>
    <div class="reply-msg" id="nb-msg" style="margin-top:10px;"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let sb;
let sbInitMislukt = false;
try{
  if(typeof window.supabase === 'undefined'){
    throw new Error('Supabase-script kon niet geladen worden (mogelijk een netwerk- of adblocker-probleem).');
  }
  sb = window.supabase.createClient('https://pscybcirexnltqvziixt.supabase.co', 'sb_publishable_9cyuoATNMTImTp207rTHaA_sXGi5fm6');
}catch(e){
  sbInitMislukt = true;
  document.body.style.opacity='1';
  document.body.innerHTML='<div style="padding:60px;text-align:center;color:#c0392b;font-size:14px;max-width:500px;margin:0 auto;">'+e.message+'</div>';
}
let BERICHTEN = [];
let VERZONDEN = [];
let HUIDIG_BERICHT_ID = null;
let HUIDIGE_TAB = 'in';
let HUIDIG_TEAMLID = null;

async function init(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session){ window.location.href='postvak-login.html'; return; }

    const{data:teamlid,error:teamlidError}=await sb.from('kronr_team').select('id,naam').eq('auth_user_id',session.user.id).maybeSingle();
    if(teamlidError){
      document.body.style.opacity='1';
      document.body.innerHTML='<div style="padding:60px;text-align:center;color:var(--red);font-size:14px;">Kon niet controleren of je toegang hebt: '+teamlidError.message+'</div>';
      return;
    }
    if(!teamlid){
      await sb.auth.signOut();
      window.location.href='postvak-login.html';
      return;
    }
    HUIDIG_TEAMLID = teamlid;

    document.body.style.opacity='1';
    await wisselTab('in');
  }catch(e){
    document.body.style.opacity='1';
    document.body.innerHTML='<div style="padding:60px;text-align:center;color:var(--red);font-size:14px;">Er ging iets mis bij het laden: '+e.message+'</div>';
  }
}

async function wisselTab(tab){
  HUIDIGE_TAB = tab;
  document.querySelectorAll('.tab-knop').forEach(t=>t.classList.remove('actief'));
  document.getElementById('tab-'+tab).classList.add('actief');
  document.getElementById('detail').innerHTML='<div class="detail-leeg">Selecteer een bericht om te lezen.</div>';
  HUIDIG_BERICHT_ID = null;

  document.getElementById('lijst').classList.add('toon-mobiel');
  document.getElementById('detail').classList.remove('toon-mobiel');

  if(tab==='uit'){
    await laadVerzonden();
  } else {
    await laadBerichten();
  }
}

async function laadBerichten(){
  const gearchiveerd = HUIDIGE_TAB==='archief';
  const{data,error}=await sb.from('kronr_berichten').select('*').eq('gearchiveerd',gearchiveerd).order('ontvangen_op',{ascending:false});
  if(error){
    document.getElementById('lijst').innerHTML='<div style="padding:24px;text-align:center;color:var(--red);font-size:12px;">Kon berichten niet laden.</div>';
    return;
  }
  BERICHTEN = data||[];
  renderLijst();
}

async function laadVerzonden(){
  const{data,error}=await sb.from('kronr_verzonden').select('*').order('verzonden_op',{ascending:false});
  if(error){
    document.getElementById('lijst').innerHTML='<div style="padding:24px;text-align:center;color:var(--red);font-size:12px;">Kon verzonden berichten niet laden.</div>';
    return;
  }
  VERZONDEN = data||[];
  renderLijst();
}

function renderLijst(){
  const lijstEl = document.getElementById('lijst');

  if(HUIDIGE_TAB==='uit'){
    if(!VERZONDEN.length){
      lijstEl.innerHTML='<div style="padding:24px;text-align:center;color:var(--mu2);font-size:12px;">Nog niks verstuurd.</div>';
      return;
    }
    lijstEl.innerHTML = VERZONDEN.map(v=>{
      const datum = new Date(v.verzonden_op).toLocaleDateString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      return `
      <div class="lijst-item ${v.id===HUIDIG_BERICHT_ID?'actief':''}" onclick="toonVerzonden('${v.id}')">
        <div class="li-van">Aan: ${v.naar_email}</div>
        <div class="li-onderwerp">${v.onderwerp||'(geen onderwerp)'}</div>
        <div class="li-datum">${datum}</div>
      </div>`;
    }).join('');
    return;
  }

  if(!BERICHTEN.length){
    lijstEl.innerHTML=`<div style="padding:24px;text-align:center;color:var(--mu2);font-size:12px;">${HUIDIGE_TAB==='archief'?'Nog niks gearchiveerd.':'Nog geen berichten.'}</div>`;
    return;
  }
  lijstEl.innerHTML = BERICHTEN.map(b=>{
    const datum = new Date(b.ontvangen_op).toLocaleDateString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    return `
    <div class="lijst-item ${b.id===HUIDIG_BERICHT_ID?'actief':''} ${!b.gelezen?'ongelezen':''}" onclick="toonBericht('${b.id}')">
      <div class="li-van">${b.van_naam||b.van_email} ${b.beantwoord?'✓':''}</div>
      <div class="li-onderwerp">${b.onderwerp||'(geen onderwerp)'}</div>
      <div class="li-datum">${datum}</div>
    </div>`;
  }).join('');
}

async function toonVerzonden(id){
  HUIDIG_BERICHT_ID = id;
  const bericht = VERZONDEN.find(v=>v.id===id);
  if(!bericht) return;

  document.getElementById('lijst').classList.remove('toon-mobiel');
  document.getElementById('detail').classList.add('toon-mobiel');
  renderLijst();

  const datum = new Date(bericht.verzonden_op).toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
  document.getElementById('detail').innerHTML = `
    <button onclick="terugNaarLijst()" style="background:none;border:none;color:var(--mu);font-size:13px;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;gap:6px;">← Terug naar lijst</button>
    <div class="detail-onderwerp">${bericht.onderwerp||'(geen onderwerp)'}</div>
    <div class="detail-van">Aan <strong>${bericht.naar_email}</strong> · ${datum}</div>
    <div class="detail-inhoud">${(bericht.inhoud||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
  `;
}

async function toonBericht(id){
  HUIDIG_BERICHT_ID = id;
  const bericht = BERICHTEN.find(b=>b.id===id);
  if(!bericht) return;

  document.getElementById('lijst').classList.remove('toon-mobiel');
  document.getElementById('detail').classList.add('toon-mobiel');

  renderLijst();

  const datum = new Date(bericht.ontvangen_op).toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
  document.getElementById('detail').innerHTML = `
    <button onclick="terugNaarLijst()" style="background:none;border:none;color:var(--mu);font-size:13px;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;gap:6px;">← Terug naar lijst</button>
    <div class="detail-onderwerp">${bericht.onderwerp||'(geen onderwerp)'}</div>
    <div class="detail-van">Van <strong>${bericht.van_naam||bericht.van_email}</strong> (${bericht.van_email}) · ${datum}</div>
    <div style="display:flex;gap:10px;margin-bottom:16px;">
      <button onclick="wisselBeantwoord('${id}',${!bericht.beantwoord})" style="font-size:12px;padding:7px 12px;border-radius:6px;border:1px solid var(--bd);background:${bericht.beantwoord?'var(--iv)':'var(--wh)'};cursor:pointer;font-family:inherit;">${bericht.beantwoord?'✓ Beantwoord':'Markeer als beantwoord'}</button>
      <button onclick="wisselArchief('${id}',${!bericht.gearchiveerd})" style="font-size:12px;padding:7px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--wh);cursor:pointer;font-family:inherit;">${bericht.gearchiveerd?'Terugzetten naar Postvak IN':'Archiveren'}</button>
    </div>
    <div class="detail-inhoud">${(bericht.inhoud||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    <div class="reply-box">
      <label style="font-size:12px;font-weight:600;color:var(--ink);margin-bottom:8px;display:block;">Antwoorden</label>
      <textarea id="reply-tekst" placeholder="Typ je antwoord..."></textarea>
      <button class="btn-reply" id="btn-reply" onclick="verstuurAntwoord()">Antwoord versturen</button>
      <div class="reply-msg" id="reply-msg"></div>
    </div>
  `;

  if(!bericht.gelezen){
    await sb.from('kronr_berichten').update({gelezen:true}).eq('id',id);
    bericht.gelezen = true;
    renderLijst();
  }
}

async function wisselBeantwoord(id, nieuweStatus){
  await sb.from('kronr_berichten').update({beantwoord:nieuweStatus}).eq('id',id);
  const bericht = BERICHTEN.find(b=>b.id===id);
  if(bericht){ bericht.beantwoord = nieuweStatus; toonBericht(id); }
}

async function wisselArchief(id, nieuweStatus){
  await sb.from('kronr_berichten').update({gearchiveerd:nieuweStatus}).eq('id',id);
  // Item hoort niet meer thuis in de huidige lijst (gearchiveerd/niet-
  // gearchiveerd is nu anders) -- gewoon opnieuw laden.
  await laadBerichten();
  document.getElementById('detail').innerHTML='<div class="detail-leeg">Selecteer een bericht om te lezen.</div>';
  document.getElementById('lijst').classList.remove('toon-mobiel');
  document.getElementById('detail').classList.add('toon-mobiel');
}

function terugNaarLijst(){
  document.getElementById('lijst').classList.add('toon-mobiel');
  document.getElementById('detail').classList.remove('toon-mobiel');
}

async function verstuurAntwoord(){
  const tekst = document.getElementById('reply-tekst').value.trim();
  const msgEl = document.getElementById('reply-msg');
  if(!tekst){
    msgEl.textContent='Vul een antwoord in.';
    msgEl.className='reply-msg fout';
    msgEl.style.display='block';
    return;
  }

  const bericht = BERICHTEN.find(b=>b.id===HUIDIG_BERICHT_ID);
  const btn = document.getElementById('btn-reply');
  btn.disabled=true;btn.textContent='Versturen...';

  const{data:{session}}=await sb.auth.getSession();

  try{
    const res = await fetch('https://kronr-postvak.isaak-elia.workers.dev/versturen',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        naar: bericht.van_email,
        onderwerp: 'Re: '+(bericht.onderwerp||''),
        inhoud: tekst,
        thread_id: bericht.id,
        sessie_token: session.access_token,
      })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Versturen mislukt');

    bericht.beantwoord = true;
    msgEl.textContent='Antwoord verstuurd!';
    msgEl.className='reply-msg ok';
    msgEl.style.display='block';
    document.getElementById('reply-tekst').value='';
    renderLijst();
  }catch(e){
    msgEl.textContent='Fout: '+e.message;
    msgEl.className='reply-msg fout';
    msgEl.style.display='block';
  }

  btn.disabled=false;btn.textContent='Antwoord versturen';
}

function toonInstellingen(){
  document.getElementById('naam-tekst').value = HUIDIG_TEAMLID?.naam || '';
  document.getElementById('instellingen-msg').style.display='none';
  document.getElementById('instellingen-overlay').style.display='flex';
}
function sluitInstellingen(){
  document.getElementById('instellingen-overlay').style.display='none';
}
async function slaNaamOp(){
  const naam = document.getElementById('naam-tekst').value.trim();
  const msgEl = document.getElementById('instellingen-msg');
  const{error}=await sb.from('kronr_team').update({naam:naam||null}).eq('id',HUIDIG_TEAMLID.id);
  if(error){
    msgEl.textContent='Fout: '+error.message;
    msgEl.className='reply-msg fout';
  } else {
    HUIDIG_TEAMLID.naam = naam;
    msgEl.textContent='Opgeslagen.';
    msgEl.className='reply-msg ok';
  }
  msgEl.style.display='block';
}

function toonNieuwBericht(){
  document.getElementById('nb-naar').value='';
  document.getElementById('nb-onderwerp').value='';
  document.getElementById('nb-inhoud').value='';
  document.getElementById('nb-msg').style.display='none';
  document.getElementById('nieuw-bericht-overlay').style.display='flex';
}
function sluitNieuwBericht(){
  document.getElementById('nieuw-bericht-overlay').style.display='none';
}
async function verstuurNieuwBericht(){
  const naar = document.getElementById('nb-naar').value.trim();
  const onderwerp = document.getElementById('nb-onderwerp').value.trim();
  const inhoud = document.getElementById('nb-inhoud').value.trim();
  const msgEl = document.getElementById('nb-msg');

  if(!naar||!onderwerp||!inhoud){
    msgEl.textContent='Vul alle velden in.';
    msgEl.className='reply-msg fout';
    msgEl.style.display='block';
    return;
  }

  const btn=document.getElementById('nb-btn');
  btn.disabled=true;btn.textContent='Versturen...';

  const{data:{session}}=await sb.auth.getSession();

  try{
    const res = await fetch('https://kronr-postvak.isaak-elia.workers.dev/versturen',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ naar, onderwerp, inhoud, sessie_token: session.access_token })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Versturen mislukt');

    msgEl.textContent='Verstuurd!';
    msgEl.className='reply-msg ok';
    msgEl.style.display='block';
    setTimeout(()=>{ sluitNieuwBericht(); if(HUIDIGE_TAB==='uit') laadVerzonden(); }, 900);
  }catch(e){
    msgEl.textContent='Fout: '+e.message;
    msgEl.className='reply-msg fout';
    msgEl.style.display='block';
  }

  btn.disabled=false;btn.textContent='Versturen';
}

async function uitloggen(){
  await sb.auth.signOut();
  window.location.href='postvak-login.html';
}

// Vangnet: als er ook maar iets misgaat vóórdat init() de kans krijgt
// om de pagina zichtbaar te maken (bijvoorbeeld: de Supabase-CDN-script
// laadt niet, of iets anders faalt stil bovenaan het script), moet de
// pagina na een paar seconden hoe dan ook zichtbaar worden met een
// duidelijke melding -- nooit voor altijd wit blijven.
setTimeout(()=>{
  if(document.body.style.opacity!=='1'){
    document.body.style.opacity='1';
    document.body.innerHTML='<div style="padding:60px;text-align:center;color:#c0392b;font-size:14px;max-width:500px;margin:0 auto;">De pagina kon niet laden. Dit kan komen doordat een script (bijv. de Supabase-verbinding) niet is geladen. Probeer de pagina te verversen (evt. met een nieuw tabblad of hard-refresh), of neem contact op als dit blijft gebeuren.</div>';
  }
},4000);

if(!sbInitMislukt) init();
</script>
