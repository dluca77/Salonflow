<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planr — Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --iv:#faf8f4;--wh:#ffffff;--bd:#e8e2db;--bd2:#c8bdb0;
  --gd:#8c6d3f;--ink:#1a1714;--mu:#8a7d6e;--mu2:#bdb3a8;
  --rh:28px;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--iv);color:var(--ink);overflow:hidden;}
.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{width:52px;flex-shrink:0;background:#1a1714;display:flex;flex-direction:column;align-items:center;height:100vh;position:fixed;left:0;top:0;z-index:100;padding:12px 0;}
.sb-logo{width:32px;height:32px;background:var(--gd);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;color:#fff;font-size:13px;font-weight:700;margin-bottom:20px;text-decoration:none;border-radius:4px;}
.si{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.35);cursor:pointer;border-radius:8px;margin-bottom:4px;text-decoration:none;transition:all .15s;}
.si:hover,.si.on{background:rgba(255,255,255,0.1);color:#fff;}
.si svg{width:18px;height:18px;}
.sb-foot{margin-top:auto;}
.sb-av{width:28px;height:28px;background:var(--gd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;cursor:pointer;}

/* MAIN */
.main{margin-left:52px;flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
.topbar{height:52px;background:var(--wh);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0;}
.tb-title{font-size:17px;font-weight:600;color:var(--ink);}
.tb-sp{flex:1;}

.vtabs{display:flex;border:1px solid var(--bd);border-radius:6px;overflow:hidden;}
.vt{padding:6px 12px;border:none;border-right:1px solid var(--bd);background:var(--wh);font-size:12px;font-weight:500;color:var(--mu);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.vt:last-child{border-right:none;}
.vt.on{background:var(--ink);color:#fff;}
.tb-nav{display:flex;align-items:center;gap:4px;}
.ta{width:28px;height:28px;border:1px solid var(--bd);border-radius:6px;background:var(--wh);color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .15s;}
.ta:hover{background:var(--iv);}
.td{font-size:13px;font-weight:500;padding:0 8px;min-width:80px;text-align:center;white-space:nowrap;}
.hbg{width:32px;height:32px;border:1px solid var(--bd);border-radius:6px;background:var(--wh);color:var(--ink);cursor:pointer;display:none;align-items:center;justify-content:center;}

/* FILTER */
.fw{position:relative;}
.fb{padding:6px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--wh);font-size:12px;font-weight:500;color:var(--ink);cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.fb svg{width:11px;height:11px;color:var(--mu);}
.fd{position:absolute;top:calc(100% + 4px);left:0;background:var(--wh);border:1px solid var(--bd);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.1);min-width:170px;z-index:200;display:none;}
.fd.on{display:block;}
.fi{padding:9px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd);}
.fi:last-child{border-bottom:none;}
.fi:hover{background:var(--iv);}
.fi.sel{color:var(--gd);font-weight:500;}
.fd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── KALENDER ──
   Één scrollbare container, sticky header + sticky tijdkolom */
.cal{flex:1;overflow:auto;position:relative;background:var(--wh);padding-bottom:env(safe-area-inset-bottom,16px);}
.cal::-webkit-scrollbar{width:4px;height:4px;}
.cal::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* De kalender bestaat uit een tabel-achtige structuur */
.cal-inner{display:inline-flex;flex-direction:column;min-width:100%;}

/* Header rij */
.cal-row-head{display:flex;position:sticky;top:0;z-index:20;background:var(--wh);border-bottom:2px solid var(--bd2);}
.cal-tc-head{width:52px;flex-shrink:0;position:sticky;left:0;z-index:21;background:var(--wh);border-right:1px solid var(--bd);}
.cal-days-head{display:flex;flex:1;}
.chd{flex:1;min-width:90px;padding:8px 6px 6px;text-align:center;border-right:1px solid var(--bd);cursor:pointer;transition:background .15s;}
.chd:last-child{border-right:none;}
.chd:hover{background:var(--iv);}
.chd .dn{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mu2);font-weight:500;}
.chd .dd{font-size:20px;font-weight:600;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin:2px auto;border-radius:50%;}
.chd.today .dd{background:var(--gd);color:#fff;}
.chd .dc{font-size:10px;color:var(--mu2);min-height:13px;}

/* Body rij */
.cal-row-body{display:flex;flex:1;}
.cal-tc-body{width:52px;flex-shrink:0;position:sticky;left:0;z-index:10;background:var(--wh);border-right:1px solid var(--bd);}
.tr{height:var(--rh);display:flex;align-items:flex-end;justify-content:flex-end;padding:0 7px 3px 0;border-bottom:1px solid #e5ddd5;}
.tl{font-size:10px;font-weight:600;color:var(--mu);white-space:nowrap;line-height:1;}
.tr.q .tl{font-size:9px;font-weight:400;color:var(--mu2);}
.tr.gh{border-bottom:1px solid #c5bdb5;}

.cal-days-body{display:flex;flex:1;}
.day-col{flex:1;min-width:90px;border-right:1px solid var(--bd);position:relative;background:var(--wh);}
.day-col:last-child{border-right:none;}
.day-col.tod{background:rgba(140,109,63,0.015);}

/* Grid lijnen */
.gl{height:var(--rh);border-bottom:1px solid #e5ddd5;cursor:pointer;}
.gl:hover{background:rgba(140,109,63,0.04);}
.gl.gh{border-bottom:1px solid #c5bdb5;}

/* Afspraken */
.apt{position:absolute;left:3px;right:3px;border-radius:4px;padding:4px 7px;cursor:pointer;z-index:5;overflow:hidden;}
.apt:hover{opacity:.85;}
.apt-t{font-size:10px;font-weight:500;line-height:1.3;margin-bottom:1px;}
.apt-n{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.apt-s{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.c0{background:#e8d5f5;}.c0 .apt-s{color:#7c4daa;}
.c1{background:#ffd9c0;}.c1 .apt-s{color:#d06020;}
.c2{background:#c8f0d8;}.c2 .apt-s{color:#1a8040;}
.c3{background:#c8e8ff;}.c3 .apt-s{color:#1a60a8;}
.c4{background:#ffe0e0;}.c4 .apt-s{color:#c02020;}
.c5{background:#fff3c0;}.c5 .apt-s{color:#906000;}
.c6{background:#f0d4e8;}.c6 .apt-s{color:#902060;}
.c7{background:#d4ecd8;}.c7 .apt-s{color:#206030;}

/* Now line */
.now-line{position:absolute;left:0;right:0;height:2px;background:#e05050;z-index:6;pointer-events:none;}
.now-line::before{content:'';position:absolute;left:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:#e05050;}

/* POPUP */
.pop-ov{display:none;position:fixed;inset:0;z-index:300;}
.pop-ov.on{display:block;}
.pop{position:fixed;background:var(--wh);border:1px solid var(--bd);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.12);width:280px;z-index:301;padding:18px;}
.pop-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
.pop-naam{font-size:16px;font-weight:600;}
.pop-x{width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:var(--mu);font-size:20px;line-height:1;border-radius:4px;}
.pop-x:hover{background:var(--iv);}
.pop-datum{font-size:12px;color:var(--mu);margin-bottom:14px;}
.pop-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px;}
.pop-row:last-of-type{border-bottom:none;}
.pop-row svg{width:14px;height:14px;color:var(--mu2);flex-shrink:0;}
.pop-actions{display:flex;align-items:center;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--bd);}
.pop-btn{width:34px;height:34px;border:1px solid var(--bd);background:var(--wh);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;}
.pop-btn:hover{background:var(--iv);}
.pop-btn svg{width:14px;height:14px;color:var(--mu);}
.pop-meer{margin-left:auto;padding:7px 14px;border:1px solid var(--bd);background:var(--wh);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;border-radius:6px;}
.pop-meer:hover{background:var(--iv);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:flex-end;justify-content:center;}
.modal-bg.on{display:flex;}
@media(min-width:600px){.modal-bg{align-items:center;}}
.modal{background:var(--wh);width:100%;max-width:480px;padding:24px;border-radius:12px 12px 0 0;}
@media(min-width:600px){.modal{border-radius:12px;}}
.mo-title{font-size:18px;font-weight:600;margin-bottom:16px;}
.fr{margin-bottom:12px;}
.fl{font-size:11px;font-weight:500;color:var(--mu);margin-bottom:5px;display:block;}
.fi-inp{width:100%;background:var(--iv);border:1px solid var(--bd);border-radius:6px;padding:10px 12px;font-size:14px;color:var(--ink);font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;-webkit-appearance:none;}
.fi-inp:focus{border-color:var(--gd);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mo-btn{width:100%;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px;}
.mo-btn:hover{background:#2d2520;}
.mo-btn:disabled{opacity:.4;}

/* MOB OVERLAY */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;}
.ov.on{display:block;}
.sb-mob{position:fixed;left:-100%;top:0;bottom:0;width:220px;background:#1a1714;z-index:91;display:flex;flex-direction:column;transition:left .25s;padding:16px 12px;}
.sb-mob.on{left:0;}
.mob-logo{font-family:'Playfair Display',serif;font-size:18px;color:#fff;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;}
.mob-logo em{color:var(--gd);font-style:normal;}
.mob-x{background:transparent;border:none;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;}
.mob-item{display:flex;align-items:center;gap:10px;padding:10px;color:rgba(255,255,255,.45);font-size:13px;text-decoration:none;border-radius:8px;margin-bottom:2px;border-left:2px solid transparent;}
.mob-item.on{color:#fff;border-left-color:var(--gd);background:rgba(255,255,255,.06);}
.mob-item svg{width:16px;height:16px;flex-shrink:0;}
.mob-foot{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:10px;}

@media(max-width:768px){
  .sidebar{display:none;}
  .main{margin-left:0;}
  .hbg{display:flex;}
  .tb-title{display:none;}
  .chd{min-width:72px;}
  .day-col{min-width:72px;}
}
@media(max-width:480px){
  .vtabs{display:none;}
  .fw{display:none;}
  .td{min-width:64px;font-size:12px;}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <div class="fr"><label class="fl">Dienst</label><select class="fi-inp" id="id"><option value="">Kies dienst...</option></select></div>
    <div class="fg">
      <div class="fr"><label class="fl">Datum</label><input class="fi-inp" id="idat" type="date"></div>
      <div class="fr"><label class="fl">Tijd</label><input class="fi-inp" id="itijd" type="time" value="09:00"></div>
    </div>
    <div class="fr"><label class="fl">Medewerker</label><select class="fi-inp" id="im"><option value="">Geen voorkeur</option></select></div>
    <button class="mo-btn" id="bsla" onclick="slaOp()">Afspraak opslaan</button>
  </div>
</div>

<script>
const MNS=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const DN=['Zo','Ma','Di','Wo','Do','Vr','Za'];
const RH=28,SH=6,EH=24;
let view='week',cur=new Date(),APTS=[],MEDS=[],DIENSTEN=[],filterMed=null;
cur.setHours(0,0,0,0);
const dk=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const ft=(h,m)=>String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
function wkStart(d){const c=new Date(d),dy=c.getDay(),df=dy===0?-6:1-dy;c.setDate(c.getDate()+df);c.setHours(0,0,0,0);return c;}
function getDays(){if(view==='day')return[new Date(cur)];const ws=wkStart(cur);return Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d;});}

async function loadData(){
  const s=new Date();s.setDate(s.getDate()-14);s.setHours(0,0,0,0);
  const e=new Date();e.setDate(e.getDate()+60);
  const[aR,mR,dR]=await Promise.all([
    sb.from('afspraken').select('*,medewerkers(naam),diensten(naam,prijs)').eq('salon_id',SALON_ID).gte('datum_tijd',s.toISOString()).lte('datum_tijd',e.toISOString()).order('datum_tijd'),
    sb.from('medewerkers').select('*').eq('salon_id',SALON_ID).eq('actief',true),
    sb.from('diensten').select('*').eq('salon_id',SALON_ID).eq('actief',true)
  ]);
  APTS=aR.data||[];MEDS=mR.data||[];DIENSTEN=dR.data||[];
  document.getElementById('id').innerHTML='<option value="">Kies dienst...</option>'+DIENSTEN.map(d=>`<option value="${d.id}">${d.naam} — €${d.prijs}</option>`).join('');
  document.getElementById('im').innerHTML='<option value="">Geen voorkeur</option>'+MEDS.map(m=>`<option value="${m.id}">${m.naam}</option>`).join('');
  const nm=document.querySelector('.salon-naam')?.textContent||'';
  const ini=nm.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()||'??';
  document.querySelectorAll('.salon-init').forEach(el=>el.textContent=ini);
  render();
}

function render(){
  const days=getDays();
  const today=new Date();today.setHours(0,0,0,0);
  const now=new Date();

  // Datum label
  if(view==='day') document.getElementById('td').textContent=DN[cur.getDay()]+' '+cur.getDate()+' '+MNS[cur.getMonth()];
  else{const ws=days[0],we=days[6];document.getElementById('td').textContent=ws.getDate()+' '+MNS[ws.getMonth()]+' – '+we.getDate()+' '+MNS[we.getMonth()];}

  // Dag headers
  document.getElementById('cdh').innerHTML=days.map(d=>{
    const isToday=d.getTime()===today.getTime();
    const cnt=APTS.filter(a=>a.datum_tijd.startsWith(dk(d))&&(!filterMed||a.medewerker_id===filterMed)).length;
    return`<div class="chd${isToday?' today':''}" onclick="clickDay('${dk(d)}')"><div class="dn">${DN[d.getDay()]}</div><div class="dd">${d.getDate()}</div><div class="dc">${cnt?cnt+'×':''}</div></div>`;
  }).join('');

  // Tijdkolom
  const tc=document.getElementById('ctc');tc.innerHTML='';
  for(let h=SH;h<=EH;h++)for(let q=0;q<4;q++){const r=document.createElement('div');r.className='tr'+(q>0?' q':'');const s=document.createElement('span');s.className='tl';s.textContent=ft(h,q*15);r.appendChild(s);tc.appendChild(r);}

  // Dag kolommen
  const dc=document.getElementById('cdb');dc.innerHTML='';
  days.forEach((d,di)=>{
    const key=dk(d);
    const isToday=d.getTime()===today.getTime();
    const dayApts=APTS.filter(a=>a.datum_tijd.startsWith(key)&&(!filterMed||a.medewerker_id===filterMed));
    const col=document.createElement('div');
    col.className='day-col'+(isToday?' tod':'');
    const slots=(EH-SH+1)*4;
    for(let s=0;s<slots;s++){
      const gl=document.createElement('div');
      gl.className='gl'+(s%4===3?' gh':'');
      const sh=SH+Math.floor(s/4),sm=(s%4)*15;
      gl.onclick=()=>{document.getElementById('idat').value=key;document.getElementById('itijd').value=ft(sh,sm);openModal();};
      col.appendChild(gl);
    }
    if(isToday&&now.getHours()>=SH&&now.getHours()<=EH){
      const nl=document.createElement('div');nl.className='now-line';
      nl.style.top=((now.getHours()-SH)*60+now.getMinutes())/15*RH+'px';
      col.appendChild(nl);
    }
    dayApts.forEach((a,i)=>{
      const dt=new Date(a.datum_tijd);
      const ah=dt.getHours(),am=dt.getMinutes(),dur=a.duur_min||45;
      if(ah<SH||ah>EH)return;
      const tp=((ah-SH)*60+am)/15*RH;
      const hp=Math.max(dur/15*RH,RH*2);
      const eh=Math.floor(ah+(am+dur)/60),em=(am+dur)%60;
      const card=document.createElement('div');
      card.className=`apt c${i%8}`;
      card.style.top=tp+'px';card.style.height=hp+'px';
      card.innerHTML=`<div class="apt-t">${ft(ah,am)} – ${ft(eh,em)}</div><div class="apt-n">${a.klant_naam||'Onbekend'}</div>${hp>52&&a.diensten?.naam?`<div class="apt-s">${a.diensten.naam}</div>`:''}`;
      card.onclick=e=>{e.stopPropagation();showPop(a,card);};
      col.appendChild(card);
    });
    dc.appendChild(col);
  });

  // Scroll naar 8u
  const cal=document.getElementById('cal');
  cal.scrollTop=((9-SH)*4)*RH;
}

function showPop(a,card){
  const dt=new Date(a.datum_tijd);
  const ah=dt.getHours(),am=dt.getMinutes(),dur=a.duur_min||45;
  const eh=Math.floor(ah+(am+dur)/60),em=(am+dur)%60;
  const dag=dt.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('pn').textContent=a.klant_naam||'Onbekend';
  document.getElementById('pd').textContent=dag.charAt(0).toUpperCase()+dag.slice(1)+', '+ft(ah,am)+' – '+ft(eh,em);
  document.getElementById('ps').textContent=a.diensten?.naam||'—';
  document.getElementById('pm').textContent=a.medewerkers?.naam||'—';
  document.getElementById('pu').textContent=dur+' minuten';
  const pop=document.getElementById('pop');
  const r=card.getBoundingClientRect();
  let l=r.right+10,t=r.top;
  if(l+290>window.innerWidth)l=r.left-300;
  if(t+220>window.innerHeight)t=window.innerHeight-230;
  if(t<8)t=8;
  pop.style.left=Math.max(8,l)+'px';pop.style.top=t+'px';
  document.getElementById('pov').classList.add('on');
}
function closePop(){document.getElementById('pov').classList.remove('on');}

function setView(v){
  view=v;
  document.getElementById('vt-d').classList.toggle('on',v==='day');
  document.getElementById('vt-w').classList.toggle('on',v==='week');
  render();
}
function goToday(){cur=new Date();cur.setHours(0,0,0,0);render();}
function clickDay(k){cur=new Date(k);cur.setHours(0,0,0,0);setView('day');}
function prev(){cur.setDate(cur.getDate()-(view==='day'?1:7));render();}
function next(){cur.setDate(cur.getDate()+(view==='day'?1:7));render();}

function toggleFD(){
  const fd=document.getElementById('fd');
  if(!fd.classList.contains('on')){
    const items=[{id:null,naam:'Toon alles',k:null},...MEDS.map(m=>({id:m.id,naam:m.naam,k:m.kleur||'var(--gd)'}))];
    if(MEDS.length===0){
      fd.innerHTML=`<div class="fi" style="color:var(--mu2);cursor:default;"><div class="fd-dot" style="background:var(--mu2)"></div>Toon alles</div>
        <div style="padding:10px 12px;font-size:11px;color:var(--mu2);border-top:1px solid var(--bd);">Nog geen medewerkers.<br><a href="medewerkers.html" style="color:var(--gd);text-decoration:none;">Medewerkers toevoegen →</a></div>`;
    } else {
      fd.innerHTML=items.map(m=>`<div class="fi${filterMed===m.id?' sel':''}" onclick="setFilter('${m.id}','${m.naam}',event)"><div class="fd-dot" style="background:${m.k||'var(--mu2)'}"></div>${m.naam}</div>`).join('');
    }
  }
  fd.classList.toggle('on');
}
function setFilter(id,naam,e){
  e.stopPropagation();
  filterMed=id==='null'?null:id;
  document.getElementById('fl').textContent=filterMed?naam:'Toon alles';
  document.getElementById('fd').classList.remove('on');
  render();
}
document.addEventListener('click',e=>{
  if(!document.getElementById('fw')?.contains(e.target))
    document.getElementById('fd')?.classList.remove('on');
});

function openModal(){document.getElementById('modal').classList.add('on');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('modal').classList.remove('on');document.body.style.overflow='';}
async function slaOp(){
  const naam=document.getElementById('ik').value.trim();
  const dId=document.getElementById('id').value;
  const datum=document.getElementById('idat').value;
  const tijd=document.getElementById('itijd').value;
  const mId=document.getElementById('im').value;
  if(!naam||!datum||!tijd){alert('Vul klant, datum en tijd in.');return;}
  const btn=document.getElementById('bsla');btn.disabled=true;btn.textContent='Opslaan...';
  const dt=new Date(datum+'T'+tijd);
  const d=DIENSTEN.find(x=>x.id===dId);
  const{error}=await sb.from('afspraken').insert({salon_id:SALON_ID,klant_naam:naam,dienst_id:dId||null,medewerker_id:mId||null,datum_tijd:dt.toISOString(),duur_min:d?.duur_min||45,status:'gepland'});
  btn.disabled=false;btn.textContent='Afspraak opslaan';
  if(error){alert('Fout: '+error.message);return;}
  document.getElementById('ik').value='';closeModal();await loadData();
}
function openSB(){document.getElementById('sb').classList.add('on');document.getElementById('ov').classList.add('on');document.body.style.overflow='hidden';}
function closeSB(){document.getElementById('sb').classList.remove('on');document.getElementById('ov').classList.remove('on');document.body.style.overflow='';}

setInterval(()=>{const now=new Date();document.querySelectorAll('.now-line').forEach(nl=>{nl.style.top=((now.getHours()-SH)*60+now.getMinutes())/15*RH+'px';});},30000);

if(typeof planrInit==='function')planrInit(loadData);
else window.addEventListener('load',()=>{typeof planrInit==='function'?planrInit(loadData):(document.documentElement.style.opacity='1',render());});
</script>
</body>
</html>
