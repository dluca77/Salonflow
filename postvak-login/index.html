<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postvak IN | Kronr</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#0f0d0b;--mu:#6b6058;--mu2:#a09890;--iv:#faf8f4;--bd:#e2d9ce;--gd:#8c6d3f;--wh:#ffffff;--red:#c0392b;}
body{font-family:'Inter',sans-serif;background:var(--iv);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;}
.kaart{background:var(--wh);border-radius:16px;padding:40px 32px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(15,13,11,.06);}
.terug-link{font-size:13px;color:var(--mu);text-decoration:none;display:flex;align-items:center;gap:6px;}
.terug-link:hover{color:var(--ink);}
.logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;color:var(--ink);text-align:center;margin-bottom:6px;}
.logo em{color:var(--gd);font-style:normal;}
.sub{font-size:13px;color:var(--mu);text-align:center;margin-bottom:28px;}
.frow{margin-bottom:16px;}
.flabel{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block;}
.finput{width:100%;background:var(--iv);border:1px solid var(--bd);padding:12px 14px;font-size:14px;color:var(--ink);border-radius:8px;font-family:inherit;}
.finput:focus{outline:none;border-color:var(--gd);}
.btn-main{width:100%;padding:13px;background:var(--ink);color:var(--wh);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;}
.btn-main:disabled{opacity:.5;cursor:default;}
.msg{font-size:13px;padding:10px 12px;border-radius:8px;margin-top:14px;display:none;}
.msg.fout{background:rgba(192,57,43,.08);color:var(--red);}
.msg.ok{background:rgba(45,106,79,.08);color:#2d6a4f;}
</style>
</head>
<body>

<div class="kaart">
  <div class="logo">Kronr<em>.</em></div>
  <div class="sub">Postvak IN — alleen voor het Kronr-team</div>

  <div id="sectie-login">
    <div class="frow">
      <label class="flabel">E-mailadres</label>
      <input class="finput" type="email" id="l-email" placeholder="hallo@kronr.nl">
    </div>
    <div class="frow">
      <label class="flabel">Wachtwoord</label>
      <div style="position:relative;">
        <input class="finput" type="password" id="l-pass" placeholder="••••••••" style="padding-right:44px;">
        <button type="button" onclick="wisselWwZichtbaar('l-pass',this)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:var(--mu);">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="btn-main" id="btn-login" onclick="inloggen()">Inloggen</button>
  </div>

  <div id="sectie-mfa" style="display:none;">
    <p style="font-size:13px;color:var(--mu);margin-bottom:16px;">Voer de 6-cijferige code uit je authenticator-app in.</p>
    <div class="frow">
      <label class="flabel">Verificatiecode</label>
      <input class="finput" type="text" id="mfa-login-code" maxlength="6" inputmode="numeric" style="text-align:center;font-size:18px;letter-spacing:4px;" placeholder="123456">
    </div>
    <button class="btn-main" id="btn-mfa" onclick="bevestigMfaInloggen()">Bevestigen</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<a href="https://kronr.nl/" class="terug-link">← Terug naar Kronr</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient('https://pscybcirexnltqvziixt.supabase.co', 'sb_publishable_9cyuoATNMTImTp207rTHaA_sXGi5fm6');

function toonMsg(tekst, type){
  const el = document.getElementById('msg');
  el.textContent = tekst;
  el.className = 'msg ' + (type||'fout');
  el.style.display = 'block';
}
function leegMsg(){ document.getElementById('msg').style.display='none'; }

function wisselWwZichtbaar(veldId, knop){
  const veld = document.getElementById(veldId);
  const zichtbaar = veld.type === 'text';
  veld.type = zichtbaar ? 'password' : 'text';
  knop.innerHTML = zichtbaar
    ? `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
    : `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a18.6 18.6 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
}

async function inloggen(){
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  if(!email||!pass) return toonMsg('Vul je e-mailadres en wachtwoord in.');

  const btn=document.getElementById('btn-login');
  btn.disabled=true;btn.textContent='Bezig...';

  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    btn.disabled=false;btn.textContent='Inloggen';
    return toonMsg('Inloggen mislukt: '+error.message);
  }

  // Heeft dit account 2FA ingeschakeld? Dan eerst de code vragen
  // voordat we verdergaan — zonder dit zou een wachtwoord alleen
  // (zonder de tweede factor) nog steeds voldoende zijn om in te
  // loggen, wat het hele nut van 2FA ondermijnt.
  const{data:levels} = await sb.auth.mfa.getAuthenticatorAssuranceLevel();
  if(levels.currentLevel !== levels.nextLevel){
    document.getElementById('sectie-login').style.display='none';
    document.getElementById('sectie-mfa').style.display='block';
    leegMsg();
    btn.disabled=false;btn.textContent='Inloggen';
    return;
  }

  await voltooiInloggen(btn,'Inloggen');
}

async function bevestigMfaInloggen(){
  const code = document.getElementById('mfa-login-code').value.trim();
  const btn = document.getElementById('btn-mfa');
  if(!/^\d{6}$/.test(code)){
    return toonMsg('Vul een geldige 6-cijferige code in.');
  }

  btn.disabled=true;btn.textContent='Bezig...';

  const{data:factors} = await sb.auth.mfa.listFactors();
  const factor = (factors.totp||[]).find(f=>f.status==='verified');
  if(!factor){
    btn.disabled=false;btn.textContent='Bevestigen';
    return toonMsg('Kon geen actieve 2FA-factor vinden.');
  }

  const{data:challengeData, error:challengeError} = await sb.auth.mfa.challenge({factorId:factor.id});
  if(challengeError){
    btn.disabled=false;btn.textContent='Bevestigen';
    return toonMsg('Fout: '+challengeError.message);
  }

  const{error:verifyError} = await sb.auth.mfa.verify({factorId:factor.id, challengeId:challengeData.id, code});
  if(verifyError){
    btn.disabled=false;btn.textContent='Bevestigen';
    return toonMsg('Code klopt niet, probeer opnieuw.');
  }

  await voltooiInloggen(btn,'Bevestigen');
}

// Gedeelde afronding ná een geslaagde login (met of zonder 2FA):
// controleren of dit account een teamlid is. GEEN auto-aanmaak meer —
// teamleden worden alleen door Kronr zelf via SQL toegevoegd, nooit
// via deze pagina. Zonder deze grens kon vroeger elk account dat hier
// inlogde zichzelf automatisch tot 'eigenaar' maken.
async function voltooiInloggen(btn, oorspronkelijkeTekst){
  const{data:{session}} = await sb.auth.getSession();

  const{data:teamlid}=await sb.from('kronr_team').select('id').eq('auth_user_id',session.user.id).maybeSingle();

  if(!teamlid){
    await sb.auth.signOut();
    btn.disabled=false;btn.textContent=oorspronkelijkeTekst;
    return toonMsg('Dit account heeft geen toegang tot het postvak.');
  }

  window.location.href = '/admin/';
}
</script>
</body>
</html>
