<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronr AI Worker Test</title>
<style>
body{font-family:monospace;padding:20px;background:#111;color:#0f0;font-size:14px;line-height:1.6;word-break:break-word;}
button{padding:14px 20px;font-size:16px;margin-bottom:20px;background:#333;color:#fff;border:1px solid #555;}
.err{color:#ff6b6b;}
.ok{color:#0f0;}
pre{white-space:pre-wrap;background:#000;padding:12px;border:1px solid #333;}
</style>
</head>
<body>

<h2>Kronr AI Worker — directe test</h2>
<button onclick="test()">Test de Worker nu</button>
<div id="output">Klik op de knop hierboven.</div>

<script>
async function test(){
  const out = document.getElementById('output');
  out.innerHTML = 'Bezig met testen...';

  try {
    out.innerHTML += '<br><br>Stap 1: fetch() aanroepen naar de Worker...';

    const res = await fetch('https://kronr-ai.isaak-elia.workers.dev', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        salon_naam: 'Testsalon',
        vandaag_count: 2,
        week_count: 8,
        omzet: 150,
        noshow: 0,
        bezetting: 25,
        klanten_totaal: 12,
        klanten_nieuw: 3,
        medewerkers_count: 2,
        boekingen_openstaand: 1
      })
    });

    out.innerHTML += '<br>Stap 2: response ontvangen. Status: ' + res.status + ' ' + res.statusText;
    out.innerHTML += '<br><br>Response headers:<pre>' + JSON.stringify([...res.headers.entries()], null, 2) + '</pre>';

    const text = await res.text();
    out.innerHTML += '<br>Stap 3: raw response body:<pre class="' + (res.ok ? 'ok' : 'err') + '">' + text.replace(/</g,'&lt;') + '</pre>';

    if (res.ok) {
      try {
        const data = JSON.parse(text);
        out.innerHTML += '<br class="ok">✅ Geldige JSON ontvangen. Inzichten: <pre>' + JSON.stringify(data.insights, null, 2) + '</pre>';
      } catch(e) {
        out.innerHTML += '<br><span class="err">⚠️ Response is GEEN geldige JSON: ' + e.message + '</span>';
      }
    }

  } catch (err) {
    out.innerHTML += '<br><br><span class="err">❌ FETCH FOUT (dit vangt CORS-fouten, netwerkfouten, etc.):<br>' + err.name + ': ' + err.message + '</span>';
  }
}
</script>
</body>
</html>
