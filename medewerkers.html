<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalonFlow — Medewerkers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;
  --accent:#c8f060;--accent2:#a0d040;--text:#f0ede8;--muted:#888;--muted2:#555;
  --red:#ff6b6b;--blue:#6bc4ff;--purple:#b08bff;--amber:#ffb84d;--teal:#4dffd4;--green:#4dff90;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden;}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;flex-shrink:0;height:100vh;}
.logo{padding:0 20px 28px;border-bottom:1px solid var(--border);}
.logo-mark{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);letter-spacing:-0.5px;}
.logo-mark span{color:var(--accent);}
.logo-sub{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:0.5px;text-transform:uppercase;}
.nav{padding:20px 12px;flex:1;}
.nav-section{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin-bottom:8px;margin-top:20px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--muted);transition:all 0.15s;margin-bottom:2px;text-decoration:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent);color:#1a1a1a;font-weight:600;}
.nav-icon{width:18px;height:18px;flex-shrink:0;}
.sidebar-bottom{padding:16px 12px;border-top:1px solid var(--border);}
.salon-info{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--surface2);cursor:pointer;}
.salon-avatar{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#1a1a1a;flex-shrink:0;}
.salon-name{font-size:13px;font-weight:500;}
.salon-plan{font-size:11px;color:var(--muted);}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.page-title{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-0.5px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.btn-primary{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--accent);color:#1a1a1a;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{display:flex;align-items:center;gap:6px;padding:8px 14px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-ghost:hover{color:var(--text);border-color:var(--muted);}
.content{flex:1;overflow-y:auto;padding:28px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

/* Cards grid */
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:28px;}
.member-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all 0.2s;}
.member-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.member-card.selected{border-color:var(--accent);}
.card-top{padding:20px;display:flex;flex-direction:column;align-items:center;text-align:center;border-bottom:1px solid var(--border);}
.m-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin-bottom:12px;}
.m-name{font-size:16px;font-weight:600;margin-bottom:3px;}
.m-role{font-size:12px;color:var(--muted);margin-bottom:10px;}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;}
.status-actief{background:rgba(77,255,144,0.15);color:var(--green);}
.status-vrij{background:rgba(136,135,128,0.15);color:var(--muted);}
.card-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);}
.cstat{background:var(--surface);padding:12px 8px;text-align:center;}
.cstat-val{font-size:16px;font-weight:600;}
.cstat-label{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.3px;}
.card-bottom{padding:14px 16px;display:flex;gap:6px;}

/* Detail section */
.detail-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.panel{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:20px;}
.panel-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:16px;}

/* Schedule */
.week-schedule{display:flex;flex-direction:column;gap:6px;}
.sched-row{display:flex;align-items:center;gap:12px;}
.sched-day{font-size:13px;color:var(--muted);min-width:36px;}
.sched-bar{flex:1;height:32px;background:var(--surface2);border-radius:6px;position:relative;overflow:hidden;}
.sched-fill{position:absolute;top:4px;height:24px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;}
.sched-off{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:11px;color:var(--muted2);}

/* Performance bars */
.perf-item{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.perf-label{font-size:13px;min-width:120px;}
.perf-track{flex:1;height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.perf-fill{height:100%;border-radius:99px;transition:width 0.8s ease;}
.perf-val{font-size:12px;font-weight:600;min-width:36px;text-align:right;}

/* Services list */
.service-tag{display:inline-block;padding:5px 12px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);font-size:12px;margin:3px;}

/* Upcoming */
.upcoming-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.upcoming-row:last-child{border-bottom:none;}
.up-time{font-size:12px;color:var(--muted);min-width:70px;}
.up-name{font-size:13px;font-weight:500;flex:1;}
.up-service{font-size:12px;color:var(--muted);}
.up-price{font-size:13px;font-weight:600;color:var(--accent);}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:16px;padding:28px;width:500px;border:1px solid var(--border);max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:20px;}
.form-row{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
.form-input:focus{border-color:var(--accent);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
.day-toggle-row{display:flex;gap:6px;flex-wrap:wrap;}
.day-toggle{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.day-toggle.on{background:var(--accent);color:#1a1a1a;border-color:var(--accent);font-weight:600;}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.member-card{animation:fadeIn 0.25s ease both;}

/* Mobile bottom nav */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 4px 20px;
  z-index: 30;
  justify-content: space-around;
}
.mob-nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 8px; border-radius: 8px; text-decoration: none;
  color: var(--muted); font-size: 10px; cursor: pointer; transition: color 0.15s; flex: 1;
}
.mob-nav-item.active { color: var(--accent); }
.mob-nav-item svg { width: 20px; height: 20px; }
@media (max-width: 768px) {
  .mobile-nav { display: flex; }
  .main { padding-bottom: 80px; }
  body { overflow: auto; display: block; }
  .main { width: 100%; height: auto; min-height: 100vh; overflow: visible; }
  .content { overflow: auto; }
  .topbar { padding: 12px 16px; gap: 8px; }
  .page-title { font-size: 17px; }
  .topbar-right .btn-ghost:not(:last-child) { display: none; }
  .hamburger { display: flex !important; }
  .sidebar { position: fixed !important; left: -260px !important; top: 0; z-index: 50; height: 100vh; transition: left 0.25s ease; width: 260px !important; }
  .sidebar.open { left: 0 !important; }
}
</style>
</head>

<script>
const medewerkers = [
  {id:1,naam:'Jasmijn de Vries',rol:'Senior Kapper',kleur:{bg:'rgba(107,196,255,0.2)',c:'var(--blue)'},actief:true,
   afspraken:142,omzet:6840,beoordeling:4.9,klanten:38,
   schema:[{d:'Ma',van:'09:00',tot:'18:00'},{d:'Di',van:'09:00',tot:'18:00'},{d:'Wo',van:'09:00',tot:'17:00'},{d:'Do',van:null,tot:null},{d:'Vr',van:'09:00',tot:'18:00'},{d:'Za',van:'09:00',tot:'15:00'}],
   diensten:['Knippen','Wassen + föhnen','Baard trimmen','Highlights','Opsteken'],
   vandaag:[{t:'10:00',naam:'Thomas van Dijk',dienst:'Knippen + wassen',prijs:45},{t:'11:00',naam:'Lars Smit',dienst:'Baard trimmen',prijs:25},{t:'13:30',naam:'Nadia Brouwer',dienst:'Knippen',prijs:38},{t:'15:00',naam:'Pieter Jansen',dienst:'Knippen + wassen',prijs:45}]},
  {id:2,naam:'Marco Koster',rol:'Colorist',kleur:{bg:'rgba(176,139,255,0.2)',c:'var(--purple)'},actief:true,
   afspraken:98,omzet:5720,beoordeling:4.7,klanten:24,
   schema:[{d:'Ma',van:'10:00',tot:'19:00'},{d:'Di',van:null,tot:null},{d:'Wo',van:'10:00',tot:'19:00'},{d:'Do',van:'10:00',tot:'19:00'},{d:'Vr',van:'10:00',tot:'19:00'},{d:'Za',van:'10:00',tot:'16:00'}],
   diensten:['Verven','Highlights','Balayage','Knippen','Keratin behandeling'],
   vandaag:[{t:'10:30',naam:'Fatima El Moudden',dienst:'Verven',prijs:85},{t:'14:00',naam:'Sophie Visser',dienst:'Balayage',prijs:120}]},
  {id:3,naam:'Sara Bakker',rol:'Kapper',kleur:{bg:'rgba(255,184,77,0.2)',c:'var(--amber)'},actief:false,
   afspraken:54,omzet:2430,beoordeling:4.5,klanten:19,
   schema:[{d:'Ma',van:null,tot:null},{d:'Di',van:'09:00',tot:'17:00'},{d:'Wo',van:'09:00',tot:'17:00'},{d:'Do',van:'09:00',tot:'17:00'},{d:'Vr',van:null,tot:null},{d:'Za',van:'09:00',tot:'14:00'}],
   diensten:['Knippen','Wassen + föhnen','Highlights','Kinderknippen'],
   vandaag:[{t:'09:30',naam:'Emma de Groot',dienst:'Highlights',prijs:75}]},
];

let selected = 1;

function getInitials(n){return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();}

function renderCards(){
  document.getElementById('team-grid').innerHTML = medewerkers.map((m,i)=>`
    <div class="member-card${selected===m.id?' selected':''}" onclick="select(${m.id})" style="animation-delay:${i*0.07}s">
      <div class="card-top">
        <div class="m-avatar" style="background:${m.kleur.bg};color:${m.kleur.c}">${getInitials(m.naam)}</div>
        <div class="m-name">${m.naam}</div>
        <div class="m-role">${m.rol}</div>
        <span class="status-pill ${m.actief?'status-actief':'status-vrij'}">
          <span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block"></span>
          ${m.actief?'Aan het werk':'Niet aanwezig'}
        </span>
      </div>
      <div class="card-stats">
        <div class="cstat"><div class="cstat-val" style="color:var(--accent)">€${(m.omzet/1000).toFixed(1)}k</div><div class="cstat-label">Omzet</div></div>
        <div class="cstat"><div class="cstat-val">${m.afspraken}</div><div class="cstat-label">Afspraken</div></div>
        <div class="cstat"><div class="cstat-val" style="color:var(--amber)">${m.beoordeling}</div><div class="cstat-label">Score</div></div>
      </div>
      <div class="card-bottom">
        <button class="btn-ghost" style="flex:1;justify-content:center;font-size:12px" onclick="event.stopPropagation();alert('Rooster bewerken voor ${m.naam}')">Rooster</button>
        <button class="btn-ghost" style="flex:1;justify-content:center;font-size:12px" onclick="event.stopPropagation();alert('Bericht sturen naar ${m.naam}')">Bericht</button>
      </div>
    </div>`).join('');
}

function renderDetail(){
  const m = medewerkers.find(x=>x.id===selected);
  if(!m){document.getElementById('detail-section').innerHTML='';return;}
  const days=['Ma','Di','Wo','Do','Vr','Za'];
  const maxOmzet = Math.max(...medewerkers.map(x=>x.omzet));
  document.getElementById('detail-section').innerHTML=`
    <div class="panel">
      <div class="panel-title">Weekrooster</div>
      <div class="week-schedule">
        ${m.schema.map(s=>`
          <div class="sched-row">
            <div class="sched-day">${s.d}</div>
            <div class="sched-bar">
              ${s.van ? `<div class="sched-fill" style="background:${m.kleur.bg};color:${m.kleur.c};left:${((parseInt(s.van)-8)/12*100)}%;width:${((parseInt(s.tot)-parseInt(s.van))/12*100)}%">${s.van} – ${s.tot}</div>` : `<div class="sched-off">Vrij</div>`}
            </div>
          </div>`).join('')}
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Afspraken vandaag</div>
      ${m.vandaag.map(a=>`
        <div class="upcoming-row">
          <div class="up-time">${a.t}</div>
          <div><div class="up-name">${a.naam}</div><div class="up-service">${a.dienst}</div></div>
          <div class="up-price">€${a.prijs}</div>
        </div>`).join('')}
      ${m.vandaag.length===0?'<div style="color:var(--muted);font-size:13px">Geen afspraken vandaag</div>':''}
    </div>
    <div class="panel">
      <div class="panel-title">Prestaties deze maand</div>
      <div class="perf-item">
        <div class="perf-label">Omzet</div>
        <div class="perf-track"><div class="perf-fill" style="width:${Math.round(m.omzet/maxOmzet*100)}%;background:var(--accent)"></div></div>
        <div class="perf-val">€${m.omzet}</div>
      </div>
      <div class="perf-item">
        <div class="perf-label">Bezetting</div>
        <div class="perf-track"><div class="perf-fill" style="width:${60+m.id*8}%;background:var(--blue)"></div></div>
        <div class="perf-val">${60+m.id*8}%</div>
      </div>
      <div class="perf-item">
        <div class="perf-label">Klanttevredenheid</div>
        <div class="perf-track"><div class="perf-fill" style="width:${Math.round(m.beoordeling/5*100)}%;background:var(--amber)"></div></div>
        <div class="perf-val">${m.beoordeling}/5</div>
      </div>
      <div class="perf-item">
        <div class="perf-label">Vaste klanten</div>
        <div class="perf-track"><div class="perf-fill" style="width:${Math.round(m.klanten/50*100)}%;background:var(--teal)"></div></div>
        <div class="perf-val">${m.klanten}</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Specialisaties</div>
      <div>${m.diensten.map(d=>`<span class="service-tag">${d}</span>`).join('')}</div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
        <div class="panel-title" style="margin-bottom:10px">Contact</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:6px">${m.naam.toLowerCase().replace(' ','.')}@kappersstudio.nl</div>
        <div style="font-size:13px;color:var(--muted)">+31 6 ${10000000+m.id*12345678}</div>
      </div>
    </div>`;
}

function select(id){selected=id;renderCards();renderDetail();}
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}

renderCards();
renderDetail();
function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("overlay").classList.add("open");}function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("open");}
</script>
