<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postvak IN | Kronr</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#0f0d0b;--mu:#6b6058;--mu2:#a09890;--iv:#faf8f4;--bd:#e2d9ce;--gd:#8c6d3f;--wh:#ffffff;--red:#c0392b;}
body{font-family:'Inter',sans-serif;background:var(--iv);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.kaart{background:var(--wh);border-radius:16px;padding:40px 32px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(15,13,11,.06);}
.logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;color:var(--ink);text-align:center;margin-bottom:6px;}
.logo em{color:var(--gd);font-style:normal;}
.sub{font-size:13px;color:var(--mu);text-align:center;margin-bottom:28px;}
.tabs{display:flex;gap:4px;background:var(--iv);border-radius:8px;padding:4px;margin-bottom:24px;}
.tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;color:var(--mu);}
.tab.actief{background:var(--wh);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.frow{margin-bottom:16px;}
.flabel{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block;}
.finput{width:100%;background:var(--iv);border:1px solid var(--bd);padding:12px 14px;font-size:14px;color:var(--ink);border-radius:8px;font-family:inherit;}
.finput:focus{outline:none;border-color:var(--gd);}
.btn-main{width:100%;padding:13px;background:var(--ink);color:var(--wh);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;}
.btn-main:disabled{opacity:.5;cursor:default;}
.msg{font-size:13px;padding:10px 12px;border-radius:8px;margin-top:14px;display:none;}
.msg.fout{background:rgba(192,57,43,.08);color:var(--red);}
.msg.ok{background:rgba(45,106,79,.08);color:#2d6a4f;}
</style>
</head>
<body>

<div class="kaart">
  <div class="logo">Kronr<em>.</em></div>
  <div class="sub">Postvak IN — hallo@kronr.nl</div>

  <div class="tabs">
    <div class="tab actief" id="tab-login" onclick="toonLogin()">Inloggen</div>
    <div class="tab" id="tab-reg" onclick="toonRegistreer()">Eerste keer</div>
  </div>

  <div id="sectie-login">
    <div class="frow">
      <label class="flabel">E-mailadres</label>
      <input class="finput" type="email" id="l-email" placeholder="hallo@kronr.nl">
    </div>
    <div class="frow">
      <label class="flabel">Wachtwoord</label>
      <input class="finput" type="password" id="l-pass" placeholder="••••••••">
    </div>
    <button class="btn-main" id="btn-login" onclick="inloggen()">Inloggen</button>
  </div>

  <div id="sectie-reg" style="display:none;">
    <div class="frow">
      <label class="flabel">Jouw naam</label>
      <input class="finput" type="text" id="r-naam" placeholder="Isaak">
    </div>
    <div class="frow">
      <label class="flabel">E-mailadres</label>
      <input class="finput" type="email" id="r-email" placeholder="hallo@kronr.nl">
    </div>
    <div class="frow">
      <label class="flabel">Wachtwoord</label>
      <input class="finput" type="password" id="r-pass" placeholder="Minimaal 8 tekens">
    </div>
    <button class="btn-main" id="btn-reg" onclick="registreren()">Account aanmaken</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient('https://pscybcirexnltqvziixt.supabase.co', 'sb_publishable_9cyuoATNMTImTp207rTHaA_sXGi5fm6');

function toonMsg(tekst, type){
  const el = document.getElementById('msg');
  el.textContent = tekst;
  el.className = 'msg ' + (type||'fout');
  el.style.display = 'block';
}
function leegMsg(){ document.getElementById('msg').style.display='none'; }

function toonLogin(){
  document.getElementById('sectie-login').style.display='block';
  document.getElementById('sectie-reg').style.display='none';
  document.getElementById('tab-login').classList.add('actief');
  document.getElementById('tab-reg').classList.remove('actief');
  leegMsg();
}
function toonRegistreer(){
  document.getElementById('sectie-login').style.display='none';
  document.getElementById('sectie-reg').style.display='block';
  document.getElementById('tab-reg').classList.add('actief');
  document.getElementById('tab-login').classList.remove('actief');
  leegMsg();
}

async function inloggen(){
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  if(!email||!pass) return toonMsg('Vul je e-mailadres en wachtwoord in.');

  const btn=document.getElementById('btn-login');
  btn.disabled=true;btn.textContent='Bezig...';

  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    btn.disabled=false;btn.textContent='Inloggen';
    return toonMsg('Inloggen mislukt: '+error.message);
  }

  // Check: is dit ook echt een teamlid (niet zomaar elk Supabase-account)?
  const{data:teamlid}=await sb.from('kronr_team').select('id').eq('auth_user_id',data.user.id).maybeSingle();
  if(!teamlid){
    await sb.auth.signOut();
    btn.disabled=false;btn.textContent='Inloggen';
    return toonMsg('Dit account heeft geen toegang tot het postvak.');
  }

  window.location.href='postvak.html';
}

async function registreren(){
  const naam = document.getElementById('r-naam').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass = document.getElementById('r-pass').value;
  if(!naam||!email||!pass) return toonMsg('Vul alle velden in.');
  if(pass.length<8) return toonMsg('Wachtwoord moet minimaal 8 tekens zijn.');

  const btn=document.getElementById('btn-reg');
  btn.disabled=true;btn.textContent='Bezig...';

  const{data,error}=await sb.auth.signUp({email,password:pass,options:{emailRedirectTo:'https://kronr.nl/postvak-login.html'}});
  if(error){
    btn.disabled=false;btn.textContent='Account aanmaken';
    return toonMsg('Registratie mislukt: '+error.message);
  }

  if(data.user && Array.isArray(data.user.identities) && data.user.identities.length===0){
    btn.disabled=false;btn.textContent='Account aanmaken';
    return toonMsg('Dit e-mailadres is al geregistreerd. Log in.');
  }

  if(data.user){
    await sb.from('kronr_team').insert({auth_user_id:data.user.id, naam, email, rol:'eigenaar'});
  }

  btn.disabled=false;btn.textContent='Account aanmaken';
  toonMsg('Account aangemaakt! Check je e-mail om te bevestigen, log daarna in.','ok');
}
</script>
</body>
</html>
