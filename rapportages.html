<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kronr — Rapportages</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --iv:#faf8f4;--wh:#ffffff;--wm:#f3ede4;--bd:#e2d9ce;--bd2:#c8bdb0;
  --gd:#8c6d3f;--gd2:#6e5230;--ink:#1a1714;--ink2:#3a342e;--mu:#8a7d6e;--mu2:#c2b5a4;
  --green:#2d6a4f;--red:#c0392b;
}
html,body{height:100%;background:var(--iv);color:var(--ink);font-family:'Inter',sans-serif;overflow:hidden;}
.app{display:flex;height:100vh;height:100dvh;}


/* ── SIDEBAR ── */
.sidebar{width:212px;flex-shrink:0;background:#1a1714;display:flex;flex-direction:column;height:100vh;height:100dvh;position:fixed;left:0;top:0;z-index:20;padding:16px 12px;}
.sb-logo{font-family:'Playfair Display',serif;font-size:18px;color:#fff;margin-bottom:24px;text-decoration:none;padding:0 10px;display:block;}
.sb-logo em{color:var(--gd);font-style:normal;}
.si{display:flex;align-items:center;gap:10px;padding:10px;color:rgba(255,255,255,.45);font-size:13px;cursor:pointer;border-radius:8px;margin-bottom:2px;text-decoration:none;border-left:2px solid transparent;transition:all .15s;}
.si svg{width:17px;height:17px;flex-shrink:0;}
.si:hover{background:rgba(255,255,255,.06);color:#fff;}
.si.on{color:#fff;border-left-color:var(--gd);background:rgba(255,255,255,.06);}
.si svg{width:18px;height:18px;}
.sb-foot{padding-top:16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;}
.sb-av{width:28px;height:28px;background:var(--gd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0;overflow:hidden;}
/* Mobile overlay */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998;}
.ov.on{display:block;}
.sb-mob{position:fixed;left:-100%;top:0;bottom:0;width:220px;background:#1a1714;z-index:999;display:flex;flex-direction:column;transition:left .25s ease;padding:16px 12px;}
.sb-mob.on{left:0;}
.mob-logo{font-family:'Playfair Display',serif;font-size:18px;color:#fff;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;}
.mob-logo em{color:var(--gd);font-style:normal;}
.mob-x{background:transparent;border:none;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;}
.mob-item{display:flex;align-items:center;gap:10px;padding:10px;color:rgba(255,255,255,.45);font-size:13px;text-decoration:none;border-radius:8px;margin-bottom:2px;border-left:2px solid transparent;}
.mob-item.on{color:#fff;border-left-color:var(--gd);background:rgba(255,255,255,.06);}
.mob-item svg{width:16px;height:16px;flex-shrink:0;}
.mob-foot{padding-top:16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;}
.hbg{width:36px;height:36px;border:1px solid var(--bd);border-radius:6px;background:var(--wh);color:var(--ink);cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
/* ── MAIN ── */
.main{margin-left:212px;flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:54px;background:var(--wh);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.hbg{width:32px;height:32px;border:1px solid var(--bd);background:transparent;color:var(--ink);cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.tb-logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;display:none;letter-spacing:0.5px;}
.tb-logo em{color:var(--gd);font-style:normal;}
.tb-title{font-size:17px;font-weight:600;color:var(--ink);flex-shrink:0;}
.tb-spacer{flex:1;}

/* Periode tabs */
.periods{background:var(--wh);border-bottom:1px solid var(--bd);padding:0 20px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.periods::-webkit-scrollbar{display:none;}
.pd{padding:14px 18px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu2);cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all 0.15s;}
.pd.on{color:var(--gd);border-bottom-color:var(--gd);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px;align-content:start;max-width:1400px;margin:0 auto;width:100%;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--bd);}

/* ── KPI ROW ── */
.kpi-row{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--bd);background:var(--bd);gap:1px;}
.kpi{background:var(--wh);padding:18px 20px;}
.kpi-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mu2);margin-bottom:10px;}
.kpi-val{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--ink);line-height:1;}
.kpi-val.gold{color:var(--gd);}
.kpi-change{font-size:11px;color:var(--mu2);margin-top:5px;}
.up{color:var(--green);}
.dn{color:var(--red);}

/* ── CHART ── */
.card{background:var(--wh);border:1px solid var(--bd);}
.card-head{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink);}
.card-sub{font-size:10px;letter-spacing:1px;color:var(--mu2);}
.chart-wrap{padding:20px 18px;}
.bars{display:flex;align-items:flex-end;gap:6px;height:100px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;min-height:3px;transition:height 0.4s ease;cursor:pointer;}
.bar:hover{filter:brightness(1.1);}
.bar-val{font-size:10px;font-weight:500;color:var(--gd);}
.bar-lbl{font-size:9px;color:var(--mu2);letter-spacing:1px;}

/* ── TABLE ── */
.tc-head-row{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--bd);}
.tc-head-row:first-child{background:var(--iv);}
.tc-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--bd);}
.tc-row:last-child{border-bottom:none;}
.tc-row:hover{background:var(--iv);}
.tc-name{font-size:13px;font-weight:500;}
.tc-sub{font-size:10px;color:var(--mu2);margin-top:2px;letter-spacing:0.5px;}
.tc-val{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gd);text-align:right;}
.tc-meta{font-size:10px;color:var(--mu2);text-align:right;margin-top:2px;letter-spacing:0.5px;}

/* ── AI ── */
.ai-card{background:var(--wm);border:1px solid var(--bd);grid-column:1/-1;}
.ai-head{display:flex;align-items:center;gap:8px;padding:14px 18px;border-bottom:1px solid var(--bd);}
.ai-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gd);}
.ai-body{display:grid;grid-template-columns:repeat(3,1fr);border-top:none;}
.ai-insight{padding:14px 18px;border-right:1px solid var(--bd);font-size:13px;color:var(--ink2);line-height:1.7;font-weight:300;}
.ai-insight:last-child{border-right:none;}

.empty-state{grid-column:1/-1;padding:48px;text-align:center;}
.empty-text{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu2);}

/* ── MOB OVERLAY ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:998;}
.ov.on{display:block;}
.sb-mob{position:fixed;left:-100%;top:0;width:240px;height:100%;background:var(--ink);z-index:999;display:flex;flex-direction:column;transition:left .25s;}
.sb-mob.on{left:0;}


.bni svg{width:20px;height:20px;}

/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .sidebar{width:180px;}.main{margin-left:212px;}
  .kpi-row{grid-template-columns:1fr 1fr;}
  .ai-body{grid-template-columns:1fr;}
  .ai-insight{border-right:none;border-bottom:1px solid var(--bd);}
  .ai-insight:last-child{border-bottom:none;}
}
@media(max-width:768px){
  .sidebar{display:none;}.main{margin-left:0;}
  .hbg{display:flex;}.tb-logo{display:block;}.tb-title{display:none;}
  
  .topbar{padding:0 14px;}
  .periods{padding:0 14px;}
  .content{grid-template-columns:1fr;padding:14px 14px;}
  .kpi-row{grid-template-columns:1fr 1fr;}
}
</style>

<script>
let activePeriod='maand';

// ── ISO-weeknummer, voor wekelijkse caching van het AI-prijsadvies ──
function wk(d){
  const date=new Date(d);
  date.setHours(0,0,0,0);
  date.setDate(date.getDate()+3-((date.getDay()+6)%7));
  const week1=new Date(date.getFullYear(),0,4);
  const weekNr=1+Math.round(((date-week1)/86400000-3+((week1.getDay()+6)%7))/7);
  return date.getFullYear()+'-W'+String(weekNr).padStart(2,'0');
}

// Bezettingsdata per dienst en per tijdslot, uit ruwe afspraken van de
// laatste 8 weken. Puur functie, los van DOM/Supabase, apart getest.
const PRIJSADVIES_DAGEN=['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
function berekenPrijsAdviesData(afspraken){
  const relevant=afspraken.filter(a=>!['geannuleerd','no-show'].includes(a.status) && a.diensten?.naam);

  const perDienst={};
  relevant.forEach(a=>{
    const naam=a.diensten.naam;
    if(!perDienst[naam]) perDienst[naam]={naam, prijs:a.diensten.prijs||0, aantal:0};
    perDienst[naam].aantal++;
  });

  const perSlot={};
  relevant.forEach(a=>{
    const d=new Date(a.datum_tijd);
    const uur=d.getHours();
    const dagdeel = uur<12?'ochtend':uur<17?'middag':'avond';
    const key=PRIJSADVIES_DAGEN[d.getDay()]+' '+dagdeel;
    perSlot[key]=(perSlot[key]||0)+1;
  });

  return{
    diensten: Object.values(perDienst).sort((a,b)=>b.aantal-a.aantal),
    tijdslots: Object.entries(perSlot).map(([slot,aantal])=>({slot,aantal})).sort((a,b)=>b.aantal-a.aantal),
    totaalBoekingen: relevant.length
  };
}

async function laadPrijsAdvies(){
  const body=document.getElementById('prijsadvies-body');
  if(!body) return;
  const cacheKey='kronr_prijsadvies_'+SALON_ID+'_'+wk(new Date());

  const toon=(suggesties)=>{
    body.innerHTML=suggesties.slice(0,3).map(s=>`<div class="ai-insight">${s.tekst}</div>`).join('');
  };

  const regelGebaseerd=(data)=>{
    const tips=[];
    if(data.diensten.length){
      const top=data.diensten[0];
      tips.push({dienst:top.naam, tekst:`${top.naam} is je meest geboekte dienst (${top.aantal}x in 8 weken, €${top.prijs}). Bij structureel hoge vraag is een prijsverhoging vaak goed te verdedigen.`});
    }
    if(data.tijdslots.length){
      const drukst=data.tijdslots[0];
      tips.push({dienst:null, tekst:`Je drukste moment is ${drukst.slot} (${drukst.aantal} boekingen in 8 weken). Overweeg daar een piek-toeslag of reserveer dat slot voor je duurdere diensten.`});
      if(data.tijdslots.length>1){
        const rustigst=data.tijdslots[data.tijdslots.length-1];
        tips.push({dienst:null, tekst:`${rustigst.slot} is juist je rustigste moment (${rustigst.aantal} boekingen). Een tijdelijke korting kan daar de bezetting verhogen.`});
      }
    }
    if(!tips.length) tips.push({dienst:null, tekst:'Nog niet genoeg boekingen in de laatste 8 weken voor een betrouwbaar prijsadvies.'});
    return tips;
  };

  try{
    const cached=JSON.parse(localStorage.getItem(cacheKey)||'null');
    if(cached?.suggesties?.length){ toon(cached.suggesties); return; }
  }catch(e){}

  // Aparte, vaste 8-weken terugblik -- los van de periode-knoppen boven de
  // pagina, want voor prijsadvies is 'deze maand' vaak te weinig data.
  const nu=new Date();
  const achtWekenGeleden=new Date(nu.getTime()-8*7*24*60*60*1000);
  const{data:afspraken}=await sb.from('afspraken')
    .select('status,datum_tijd,diensten(naam,prijs)')
    .eq('salon_id',SALON_ID)
    .gte('datum_tijd',achtWekenGeleden.toISOString())
    .lte('datum_tijd',nu.toISOString());

  const data=berekenPrijsAdviesData(afspraken||[]);

  if(data.totaalBoekingen<5){
    toon(regelGebaseerd(data));
    return;
  }

  try{
    const res=await fetch('https://kronr-ai.isaak-elia.workers.dev/prijsadvies',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        salon_naam: SALON?.naam,
        diensten: data.diensten,
        tijdslots: data.tijdslots,
        totaal_boekingen: data.totaalBoekingen
      })
    });
    if(!res.ok) throw new Error('AI-call mislukt');
    const result=await res.json();
    if(!result.suggesties?.length) throw new Error('Geen suggesties ontvangen');
    toon(result.suggesties);
    localStorage.setItem(cacheKey, JSON.stringify({suggesties:result.suggesties, ts:Date.now()}));
  }catch(e){
    console.warn('AI-prijsadvies niet beschikbaar, terugval op regelgebaseerd advies:', e);
    toon(regelGebaseerd(data));
  }
}

function getDateRange(period){
  const now=new Date();
  let start,end=new Date();
  if(period==='maand'){
    start=new Date(now.getFullYear(),now.getMonth(),1);
    end=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);
  } else if(period==='vorig'){
    start=new Date(now.getFullYear(),now.getMonth()-1,1);
    end=new Date(now.getFullYear(),now.getMonth(),0,23,59,59);
  } else if(period==='kwartaal'){
    const q=Math.floor(now.getMonth()/3);
    start=new Date(now.getFullYear(),q*3,1);
    end=new Date(now.getFullYear(),q*3+3,0,23,59,59);
  } else {
    start=new Date(now.getFullYear(),0,1);
    end=new Date(now.getFullYear(),11,31,23,59,59);
  }
  return{start,end};
}

async function loadData(){
  const{start,end}=getDateRange(activePeriod);
  const nm=document.querySelector('.salon-naam')?.textContent||'';
  document.querySelectorAll('.salon-init').forEach(el=>el.textContent=nm.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()||'??');

  const[betRes,aptRes,medRes]=await Promise.all([
    sb.from('betalingen').select('bedrag,methode,datum').eq('salon_id',SALON_ID).gte('datum',start.toISOString()).lte('datum',end.toISOString()),
    sb.from('afspraken').select('*,medewerkers(naam),diensten(naam,prijs)').eq('salon_id',SALON_ID).gte('datum_tijd',start.toISOString()).lte('datum_tijd',end.toISOString()),
    sb.from('medewerkers').select('*').eq('salon_id',SALON_ID).eq('actief',true)
  ]);

  const betalingen=betRes.data||[];
  const afspraken=aptRes.data||[];
  const medewerkers=medRes.data||[];

  const omzet=betalingen.reduce((s,b)=>s+parseFloat(b.bedrag||0),0);
  const apts=afspraken.length;
  const gemBon=apts>0?(omzet/apts).toFixed(2):0;
  const noshow=afspraken.filter(a=>a.status==='no-show').length;
  const noshowPct=apts>0?((noshow/apts)*100).toFixed(1):0;

  // Bar chart: omzet per week/maand
  const weeks=[0,0,0,0];
  betalingen.forEach(b=>{
    const d=new Date(b.datum);
    const w=Math.min(3,Math.floor((d.getDate()-1)/7));
    weeks[w]+=parseFloat(b.bedrag||0);
  });
  const maxW=Math.max(...weeks,1);

  // Per medewerker
  const medStats=medewerkers.map(m=>{
    const mApts=afspraken.filter(a=>a.medewerker_id===m.id);
    const mOmzet=mApts.reduce((s,a)=>s+(a.diensten?.prijs||0),0);
    return{...m,apts:mApts.length,omzet:mOmzet};
  }).sort((a,b)=>b.omzet-a.omzet);

  // Top diensten
  const dienstCount={};
  afspraken.forEach(a=>{
    if(!a.diensten?.naam)return;
    const k=a.diensten.naam;
    if(!dienstCount[k])dienstCount[k]={naam:k,prijs:a.diensten.prijs||0,count:0,omzet:0};
    dienstCount[k].count++;
    dienstCount[k].omzet+=a.diensten.prijs||0;
  });
  const topDiensten=Object.values(dienstCount).sort((a,b)=>b.omzet-a.omzet).slice(0,5);

  // Inzichten
  const insights=[];
  if(omzet>0) insights.push(`Totale omzet deze periode: €${omzet.toFixed(0)}.`);
  else insights.push('Nog geen betalingen in deze periode. Gebruik de kassa om betalingen te registreren.');
  if(apts>0) insights.push(`${apts} afspraken verwerkt, gemiddelde bon €${gemBon}.`);
  if(noshow>0) insights.push(`${noshow} no-show${noshow>1?'s':''} (${noshowPct}%). Stuur herinneringen om dit te verlagen.`);
  else if(apts>0) insights.push('Geen no-shows — uitstekend!');

  // Render
  const c=document.getElementById('content');
  c.innerHTML=`
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Omzet</div>
        <div class="kpi-val gold">€${omzet.toFixed(0)}</div>
        <div class="kpi-change">via kassa geregistreerd</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Afspraken</div>
        <div class="kpi-val">${apts}</div>
        <div class="kpi-change">in geselecteerde periode</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Gem. bon</div>
        <div class="kpi-val">€${gemBon}</div>
        <div class="kpi-change">per afspraak</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">No-show</div>
        <div class="kpi-val">${noshowPct}%</div>
        <div class="kpi-change">${noshow} van ${apts} afspraken</div>
      </div>
    </div>

    <!-- Bar chart -->
    <div class="card">
      <div class="card-head">
        <div class="card-title">Omzet per week</div>
        <div class="card-sub">gebaseerd op kassabetalingen</div>
      </div>
      <div class="chart-wrap">
        <div class="bars">
          ${weeks.map((v,i)=>`
            <div class="bar-wrap">
              <div class="bar-val">€${Math.round(v)}</div>
              <div class="bar" style="height:${Math.round(v/maxW*100)}%;background:${i===3?'var(--gd)':'var(--bd2)'}"></div>
              <div class="bar-lbl">W${i+1}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Medewerkers -->
    <div class="card">
      <div class="card-head"><div class="card-title">Medewerkers</div></div>
      ${medStats.length?medStats.map(m=>`
        <div class="tc-row">
          <div>
            <div class="tc-name">${m.naam}</div>
            <div class="tc-sub">${m.apts} afspraken · ${m.rol}</div>
          </div>
          <div>
            <div class="tc-val">€${m.omzet}</div>
            <div class="tc-meta">omzet</div>
          </div>
        </div>`).join(''):`<div style="padding:24px;text-align:center;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mu2);">Nog geen medewerkers</div>`}
    </div>

    <!-- Top diensten -->
    <div class="card">
      <div class="card-head"><div class="card-title">Top diensten</div></div>
      ${topDiensten.length?topDiensten.map(d=>`
        <div class="tc-row">
          <div>
            <div class="tc-name">${d.naam}</div>
            <div class="tc-sub">${d.count}× geboekt</div>
          </div>
          <div>
            <div class="tc-val">€${d.omzet}</div>
            <div class="tc-meta">omzet</div>
          </div>
        </div>`).join(''):`<div style="padding:24px;text-align:center;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mu2);">Nog geen afspraken met diensten</div>`}
    </div>

    <!-- AI insights -->
    <div class="ai-card">
      <div class="ai-head">
        <svg width="13" height="13" fill="none" stroke="var(--gd)" stroke-width="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <div class="ai-title">Kronr inzichten</div>
      </div>
      <div class="ai-body">
        ${insights.map(i=>`<div class="ai-insight">${i}</div>`).join('')}
      </div>
    </div>

    <!-- AI prijsadvies -->
    <div class="ai-card">
      <div class="ai-head">
        <svg width="13" height="13" fill="none" stroke="var(--gd)" stroke-width="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <div class="ai-title">AI Prijsadvies</div>
        <span style="font-size:10px;color:var(--mu2);margin-left:auto;">gebaseerd op de laatste 8 weken · 1x per week vernieuwd</span>
      </div>
      <div class="ai-body" id="prijsadvies-body">
        <div class="ai-insight">Advies wordt geladen...</div>
      </div>
    </div>
  `;

  laadPrijsAdvies();
}

function setPeriod(p,btn){
  activePeriod=p;
  document.querySelectorAll('.pd').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  loadData();
}

function openSB(){document.getElementById('sb').classList.add('on');document.getElementById('ov').classList.add('on');document.body.style.overflow='hidden';}
function closeSB(){document.getElementById('sb').classList.remove('on');document.getElementById('ov').classList.remove('on');document.body.style.overflow='';}

kronrInit(loadData,'rapportages');
</script>
</body>
