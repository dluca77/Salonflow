<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kronr — Klanten</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --iv:#faf8f4;--wh:#ffffff;--wm:#f3ede4;--bd:#e2d9ce;--bd2:#c8bdb0;
  --gd:#8c6d3f;--gd2:#6e5230;--ink:#1a1714;--ink2:#3a342e;--mu:#8a7d6e;--mu2:#c2b5a4;
}
html,body{height:100%;background:var(--iv);color:var(--ink);font-family:'Inter',sans-serif;overflow:hidden;}
.app{display:flex;height:100vh;}


/* ── SIDEBAR ── */
.sidebar{width:52px;flex-shrink:0;background:#1a1714;display:flex;flex-direction:column;align-items:center;height:100vh;position:fixed;left:0;top:0;z-index:20;padding:12px 0;}
.sb-logo{width:32px;height:32px;background:var(--gd);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;color:#fff;font-size:13px;font-weight:700;margin-bottom:20px;text-decoration:none;border-radius:4px;}
.si{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);border-radius:8px;margin-bottom:4px;text-decoration:none;transition:all .15s;cursor:pointer;}
.si:hover,.si.on{background:rgba(255,255,255,.1);color:#fff;}
.si svg{width:18px;height:18px;}
.sb-foot{margin-top:auto;}
.sb-av{width:28px;height:28px;background:var(--gd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;cursor:pointer;}
/* Mobile overlay */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998;}
.ov.on{display:block;}
.sb-mob{position:fixed;left:-100%;top:0;bottom:0;width:220px;background:#1a1714;z-index:999;display:flex;flex-direction:column;transition:left .25s ease;padding:16px 12px;}
.sb-mob.on{left:0;}
.mob-logo{font-family:'Playfair Display',serif;font-size:18px;color:#fff;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;}
.mob-logo em{color:var(--gd);font-style:normal;}
.mob-x{background:transparent;border:none;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;}
.mob-item{display:flex;align-items:center;gap:10px;padding:10px;color:rgba(255,255,255,.45);font-size:13px;text-decoration:none;border-radius:8px;margin-bottom:2px;border-left:2px solid transparent;}
.mob-item.on{color:#fff;border-left-color:var(--gd);background:rgba(255,255,255,.06);}
.mob-item svg{width:16px;height:16px;flex-shrink:0;}
.mob-foot{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;}
.hbg{width:36px;height:36px;border:1px solid var(--bd);border-radius:6px;background:var(--wh);color:var(--ink);cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
/* ── MAIN ── */
.main{margin-left:52px;flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── TOPBAR ── */
.topbar{height:54px;background:var(--wh);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.hbg{width:32px;height:32px;border:1px solid var(--bd);background:transparent;color:var(--ink);cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.tb-logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;display:none;letter-spacing:0.5px;}
.tb-logo em{color:var(--gd);font-style:normal;}
.tb-title{font-size:13px;font-weight:500;color:var(--mu);}
.tb-spacer{flex:1;}
.btn-add{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:var(--ink);color:var(--iv);font-size:10px;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.2s;white-space:nowrap;}
.btn-add:hover{background:var(--ink2);}

/* ── SEARCH + FILTERS ── */
.search-wrap{background:var(--wh);border-bottom:1px solid var(--bd);padding:12px 20px;flex-shrink:0;display:flex;align-items:center;gap:10px;}
.search-inner{position:relative;flex:1;min-width:0;}
.s-inp{width:100%;background:var(--iv);border:1px solid var(--bd);padding:10px 14px 10px 38px;font-size:13px;color:var(--ink);font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none;transition:border-color 0.15s;}
.s-inp:focus{border-color:var(--gd);}
.s-inp::placeholder{color:var(--mu2);}
.si-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mu2);}

/* Filter trechter (zelfde patroon als agenda.html) */
.fw{position:relative;flex-shrink:0;}
.fb{width:38px;height:38px;border:1px solid var(--bd2);border-radius:6px;background:var(--wh);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative;flex-shrink:0;}
.fb:hover{background:var(--iv);}
.fb.actief{background:var(--ink);color:#fff;border-color:var(--ink);}
.fb-dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:var(--gd);border:2px solid var(--wh);display:none;}
.fb.actief .fb-dot{display:block;}
.fd{position:absolute;top:calc(100% + 4px);right:0;background:var(--wh);border:1px solid var(--bd);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);min-width:210px;z-index:200;display:none;}
.fd.on{display:block;}
.fd-lbl{padding:9px 12px 4px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mu2);font-weight:600;}
.fd-item{padding:9px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd);}
.fd-item:last-child{border-bottom:none;}
.fd-item:hover{background:var(--iv);}
.fd-item.sel{color:var(--gd);font-weight:500;}
.fd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.filters{display:flex;gap:6px;padding:10px 20px;background:var(--wh);border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.filters::-webkit-scrollbar{display:none;}
.ft{padding:6px 16px;border:1px solid var(--bd);background:transparent;color:var(--mu);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:all 0.15s;}
.ft.on{background:var(--ink);color:var(--iv);border-color:var(--ink);}
.gbadge{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.gbadge.man{background:#6e93b0;}
.gbadge.vrouw{background:#c07a91;}
.gbadge.anders{background:var(--mu2);}

/* ── KLANTEN LIJST ── */
.list-wrap{flex:1;overflow-y:auto;padding:0;}
.list-wrap::-webkit-scrollbar{width:3px;}
.list-wrap::-webkit-scrollbar-thumb{background:var(--bd);}
.kcount{padding:12px 20px 8px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu2);}
.klist{padding:0 20px 80px;}

.kcard{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:background 0.1s;}
.kcard:hover .kname{color:var(--gd);}
.kav{width:40px;height:40px;background:var(--wm);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--gd);flex-shrink:0;}
.kinfo{flex:1;min-width:0;}
.kname{font-size:14px;font-weight:500;margin-bottom:2px;transition:color 0.15s;}
.kmeta{font-size:11px;color:var(--mu2);}
.kright{text-align:right;flex-shrink:0;}
.kval{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gd);}
.kvis{font-size:10px;letter-spacing:1px;color:var(--mu2);margin-top:2px;}

.empty-state{padding:48px 20px;text-align:center;}
.empty-text{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu2);margin-bottom:8px;}
.empty-sub{font-size:12px;color:var(--mu2);}

/* ── MODALS ── */
.mbg{display:none;position:fixed;inset:0;background:rgba(26,23,20,0.6);z-index:60;align-items:flex-end;justify-content:center;}
.mbg.on{display:flex;}
.modal{background:var(--wh);width:100%;max-width:520px;padding:24px 20px 40px;border-top:2px solid var(--gd);}
.mh{width:32px;height:3px;background:var(--bd);margin:0 auto 20px;}
.mt{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:4px;}
.msub{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--mu2);margin-bottom:20px;}
.fr{margin-bottom:14px;}
.fl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:6px;display:block;}
.fi{width:100%;background:var(--iv);border:1px solid var(--bd);padding:12px 14px;font-size:14px;color:var(--ink);font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none;transition:border-color 0.15s;resize:none;}
.fi:focus{border-color:var(--gd);}
.fi::placeholder{color:var(--mu2);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btsv{width:100%;padding:15px;background:var(--ink);color:var(--iv);border:none;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px;transition:background 0.2s;}
.btsv:hover{background:var(--ink2);}
.btsv:disabled{opacity:0.4;}
.spinner-inline{display:inline-block;width:14px;height:14px;border:2px solid rgba(250,248,244,0.3);border-top-color:var(--iv);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Detail modal */
.detail-head{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.detail-av{width:52px;height:52px;background:var(--wm);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gd);flex-shrink:0;}
.dr{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd);}
.dr:last-child{border-bottom:none;}
.dr-l{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu2);}
.dr-v{font-size:13px;font-weight:500;}
.dr-v-gold{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gd);}
.btns-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.btn-sec{padding:13px;background:transparent;color:var(--mu);border:1px solid var(--bd);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-prim{padding:13px;background:var(--ink);color:var(--iv);border:none;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;}

/* ── MOB OVERLAY ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:998;}
.ov.on{display:block;}
.sb-mob{position:fixed;left:-100%;top:0;width:240px;height:100%;background:var(--ink);z-index:999;display:flex;flex-direction:column;transition:left .25s;}
.sb-mob.on{left:0;}


.bni svg{width:20px;height:20px;}

/* ── RESPONSIVE ── */
@media(max-width:1024px){.sidebar{width:180px;}.main{margin-left:52px;}}
@media(max-width:768px){
  .sidebar{display:none;}.main{margin-left:0;}
  .hbg{display:flex;}.tb-logo{display:block;}.tb-title{display:none;}
  
  .topbar{padding:0 14px;}
  .search-wrap{padding:10px 14px;}
  .filters{padding:8px 14px;}
  .kcount{padding:10px 14px 6px;}
  .klist{padding:0 14px 80px;}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="kronr.js"></script>

<script>setTimeout(()=>{document.documentElement.style.opacity="1";},3000);</script>

  <a href="klanten.html" class="mob-item on"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Klanten</a>

</div>

  <div class="topbar">

    <div class="tb-logo">Kronr<em>.</em></div>
    <div class="tb-title">Klanten</div>

  </div>

  <div class="search-wrap">
    <div class="search-inner">
      <svg class="si-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="s-inp" type="search" placeholder="Zoek op naam of e-mail..." oninput="filter(this.value)">
    </div>

      <button class="fb" onclick="toggleFD()" id="filter-btn" title="Filters">

<!-- Nieuwe klant modal -->
<div class="mbg" id="m-new" onclick="if(event.target===this)closeM('m-new')">
  <div class="modal">
    <div class="mh"></div>
    <div class="mt" id="m-new-title">Nieuwe klant</div>
    <div class="msub">Voeg een klant toe aan het systeem</div>
    <div id="m-new-msg" style="display:none;padding:10px 14px;border-left:3px solid;font-size:13px;margin-bottom:14px;"></div>
    <div class="fg">
      <div class="fr"><label class="fl">Voornaam</label><input class="fi" id="k-voor" type="text" placeholder="Jasmijn"></div>

    </div>
    <div class="fr"><label class="fl">Telefoon</label><input class="fi" id="k-tel" type="tel" placeholder="+31 6 12345678"></div>
    <div class="fr"><label class="fl">E-mail</label><input class="fi" id="k-email" type="email" placeholder="naam@email.nl"></div>
    <div class="fr"><label class="fl">Geslacht</label>
      <select class="fi" id="k-geslacht">

        <option value="vrouw">Vrouw</option>
        <option value="anders">Anders</option>

<!-- Detail modal -->
<div class="mbg" id="m-detail" onclick="if(event.target===this)closeM('m-detail')">
  <div class="modal">
    <div class="mh"></div>
    <div class="detail-head">
      <div class="detail-av" id="d-av"></div>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;" id="d-naam"></div>
        <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mu2);margin-top:3px;" id="d-sub"></div>
      </div>
    </div>
    <div style="border:1px solid var(--bd);">
      <div class="dr"><span class="dr-l">Omzet totaal</span><span class="dr-v dr-v-gold" id="d-omzet">—</span></div>
      <div class="dr"><span class="dr-l">Geslacht</span><span class="dr-v" id="d-geslacht">—</span></div>
      <div class="dr"><span class="dr-l">Bezoeken</span><span class="dr-v" id="d-bz">—</span></div>
      <div class="dr"><span class="dr-l">Gem. bon</span><span class="dr-v" id="d-gem">—</span></div>
      <div class="dr"><span class="dr-l">Laatste bezoek</span><span class="dr-v" id="d-last">—</span></div>
      <div class="dr"><span class="dr-l">Favoriete dienst</span><span class="dr-v" id="d-sv">—</span></div>
      <div class="dr"><span class="dr-l">Notities</span><span class="dr-v" id="d-notitie" style="color:var(--mu);font-weight:300;">—</span></div>
    </div>
    <div class="btns-row">
      <button class="btn-sec" onclick="editK()">Bewerken</button>
      <button class="btn-prim" onclick="closeM('m-detail')">Afspraak plannen →</button>
    </div>
  </div>
</div>

<script>
let KLANTEN=[], activeF='alle', activeQ='', activeG='alle', activeSort='naam-az', editingId=null, currentDetailId=null;

async function loadData(){
  const {data,error}=await sb.from('klanten').select('*').eq('salon_id',SALON_ID).order('naam');
  KLANTEN=data||[];
  // Sidebar initials
  const nm=document.querySelector('.salon-naam')?.textContent||'';
  document.querySelectorAll('.salon-init').forEach(el=>el.textContent=nm.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()||'??');
  render();
}

function getInit(naam){return naam.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}

function render(){
  const list=document.getElementById('klist');
  const q=activeQ.toLowerCase();
  let filtered=KLANTEN.filter(k=>{
    const mq=!q||k.naam.toLowerCase().includes(q)||(k.email||'').toLowerCase().includes(q)||(k.telefoon||'').includes(q);
    const sinceDate=new Date(k.created_at);
    const daysSince=(new Date()-sinceDate)/(1000*60*60*24);
    const mf=activeF==='alle'||(activeF==='recent'&&daysSince<=30)||(activeF==='inactief'&&daysSince>90);
    const mg=activeG==='alle'||k.geslacht===activeG;
    return mq&&mf&&mg;
  });

  filtered.sort((a,b)=>{
    if(activeSort==='naam-az')return a.naam.localeCompare(b.naam);
    if(activeSort==='naam-za')return b.naam.localeCompare(a.naam);
    if(activeSort==='nieuw')return new Date(b.created_at)-new Date(a.created_at);
    if(activeSort==='oud')return new Date(a.created_at)-new Date(b.created_at);
    return 0;
  });

  document.getElementById('kcount').textContent=filtered.length+' klant'+(filtered.length!==1?'en':'');

  if(!filtered.length){
    list.innerHTML=`<div class="empty-state">
      <div class="empty-text">${activeQ?'Geen resultaten':'Nog geen klanten'}</div>
      <div class="empty-sub">${activeQ?'Probeer een andere zoekopdracht':'Voeg je eerste klant toe via + Klant'}</div>
    </div>`;
    return;
  }

  list.innerHTML=filtered.map(k=>{
    const init=getInit(k.naam);
    const since=new Date(k.created_at).toLocaleDateString('nl-NL',{month:'short',year:'numeric'});
    const gb=k.geslacht?`<span class="gbadge ${k.geslacht}"></span>`:'';
    return `<div class="kcard" onclick="showK('${k.id}')">
      <div class="kav">${init}</div>
      <div class="kinfo">
        <div class="kname">${gb}${k.naam}</div>
        <div class="kmeta">${k.email||k.telefoon||'Geen contactgegevens'} · Klant sinds ${since}</div>
      </div>
      <div class="kright">
        <div class="kval">—</div>
        <div class="kvis">0 bezoeken</div>
      </div>
    </div>`;
  }).join('');
}

function showK(id){
  const k=KLANTEN.find(x=>x.id===id);if(!k)return;
  currentDetailId=id;
  const init=getInit(k.naam);
  const since=new Date(k.created_at).toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('d-av').textContent=init;
  document.getElementById('d-naam').textContent=k.naam;
  document.getElementById('d-sub').textContent=(k.email||'')+(k.telefoon?' · '+k.telefoon:'');
  document.getElementById('d-omzet').textContent='€0';
  document.getElementById('d-geslacht').textContent=k.geslacht?k.geslacht.charAt(0).toUpperCase()+k.geslacht.slice(1):'—';
  document.getElementById('d-bz').textContent='0';
  document.getElementById('d-gem').textContent='—';
  document.getElementById('d-last').textContent='—';
  document.getElementById('d-sv').textContent='—';
  document.getElementById('d-notitie').textContent=k.notities||'—';
  openM('m-detail');
}

function editK(){
  const k=KLANTEN.find(x=>x.id===currentDetailId);if(!k)return;
  editingId=k.id;
  document.getElementById('m-new-title').textContent='Klant bewerken';
  document.getElementById('btn-klant-opslaan').textContent='Wijzigingen opslaan';
  const delen=k.naam.split(' ');
  document.getElementById('k-voor').value=delen[0]||'';
  document.getElementById('k-achter').value=delen.slice(1).join(' ')||'';
  document.getElementById('k-tel').value=k.telefoon||'';
  document.getElementById('k-email').value=k.email||'';
  document.getElementById('k-geslacht').value=k.geslacht||'';
  document.getElementById('k-notitie').value=k.notities||'';
  closeM('m-detail');
  openM('m-new');
}

function resetKlantForm(){
  ['k-voor','k-achter','k-tel','k-email','k-notitie'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('k-geslacht').value='';
  editingId=null;
  document.getElementById('m-new-title').textContent='Nieuwe klant';
  document.getElementById('btn-klant-opslaan').textContent='Klant opslaan';
}

async function slaKlantOp(){
  const voor=document.getElementById('k-voor').value.trim();
  const achter=document.getElementById('k-achter').value.trim();
  const tel=document.getElementById('k-tel').value.trim();
  const email=document.getElementById('k-email').value.trim();
  const geslacht=document.getElementById('k-geslacht').value||null;
  const notitie=document.getElementById('k-notitie').value.trim();
  const msgEl=document.getElementById('m-new-msg');

  if(!voor){
    msgEl.textContent='Vul een voornaam in.';
    msgEl.style.cssText='display:block;padding:10px 14px;border-left:3px solid var(--gd2);font-size:13px;margin-bottom:14px;background:rgba(140,109,63,0.06);color:var(--gd2);';
    return;
  }

  const btn=document.getElementById('btn-klant-opslaan');
  const savingLabel=editingId?'Wijzigingen opslaan':'Klant opslaan';
  btn.disabled=true;btn.innerHTML='<span class="spinner-inline"></span>';

  const naam=voor+(achter?' '+achter:'');
  const payload={naam,email:email||null,telefoon:tel||null,notities:notitie||null,geslacht};
  let error;
  if(editingId){
    ({error}=await sb.from('klanten').update(payload).eq('id',editingId));
  }else{
    ({error}=await sb.from('klanten').insert({salon_id:SALON_ID,...payload}));
  }

  btn.disabled=false;btn.textContent=savingLabel;

  if(error){
    msgEl.textContent='Fout bij opslaan: '+error.message;
    msgEl.style.cssText='display:block;padding:10px 14px;border-left:3px solid #c0392b;font-size:13px;margin-bottom:14px;background:rgba(192,57,43,0.06);color:#c0392b;';
    return;
  }

  msgEl.style.display='none';
  resetKlantForm();
  closeM('m-new');
  await loadData();
}

function filter(v){activeQ=v;render();}

// ── FILTER TRECHTER (zelfde patroon als agenda.html) ──
function renderFD(){
  const fd=document.getElementById('fd');
  const statusItems=[{id:'alle',lbl:'Alle klanten'},{id:'recent',lbl:'Recent'},{id:'inactief',lbl:'Inactief'}];
  const genderItems=[{id:'alle',lbl:'Alle geslachten'},{id:'man',lbl:'Man'},{id:'vrouw',lbl:'Vrouw'},{id:'anders',lbl:'Anders'}];
  const sortItems=[{id:'naam-az',lbl:'Naam A-Z'},{id:'naam-za',lbl:'Naam Z-A'},{id:'nieuw',lbl:'Nieuwste eerst'},{id:'oud',lbl:'Oudste eerst'}];
  fd.innerHTML=
    `<div class="fd-lbl">Status</div>`+
    statusItems.map(s=>`<div class="fd-item${activeF===s.id?' sel':''}" onclick="setStatusFD('${s.id}',event)">
      <div class="fd-dot" style="background:${activeF===s.id?'var(--gd)':'var(--mu2)'}"></div>${s.lbl}
    </div>`).join('')+
    `<div class="fd-lbl">Geslacht</div>`+
    genderItems.map(g=>`<div class="fd-item${activeG===g.id?' sel':''}" onclick="setGenderFD('${g.id}',event)">
      <div class="fd-dot" style="background:${activeG===g.id?'var(--gd)':'var(--mu2)'}"></div>${g.lbl}
    </div>`).join('')+
    `<div class="fd-lbl">Sorteren</div>`+
    sortItems.map(s=>`<div class="fd-item${activeSort===s.id?' sel':''}" onclick="setSortFD('${s.id}',event)">
      <div class="fd-dot" style="background:${activeSort===s.id?'var(--gd)':'var(--mu2)'}"></div>${s.lbl}
    </div>`).join('');
}
function toggleFD(){
  const fd=document.getElementById('fd');
  if(!fd.classList.contains('on')) renderFD();
  fd.classList.toggle('on');
}
function isFilterActief(){return activeF!=='alle'||activeG!=='alle'||activeSort!=='naam-az';}
function setStatusFD(v,e){e.stopPropagation();activeF=v;document.getElementById('filter-btn').classList.toggle('actief',isFilterActief());renderFD();render();}
function setGenderFD(v,e){e.stopPropagation();activeG=v;document.getElementById('filter-btn').classList.toggle('actief',isFilterActief());renderFD();render();}
function setSortFD(v,e){e.stopPropagation();activeSort=v;document.getElementById('filter-btn').classList.toggle('actief',isFilterActief());renderFD();render();}
document.addEventListener('click',e=>{
  if(!document.getElementById('fw')?.contains(e.target)) document.getElementById('fd')?.classList.remove('on');
});
function openSB(){document.getElementById('sb').classList.add('on');document.getElementById('ov').classList.add('on');document.body.style.overflow='hidden';}
function closeSB(){document.getElementById('sb').classList.remove('on');document.getElementById('ov').classList.remove('on');document.body.style.overflow='';}
function openM(id){document.getElementById(id).classList.add('on');document.body.style.overflow='hidden';}
function closeM(id){document.getElementById(id).classList.remove('on');document.body.style.overflow='';if(id==='m-new')resetKlantForm();}

kronrInit(loadData);
</script>
</body>
</html>
