<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postvak IN | Kronr</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#0f0d0b;--mu:#6b6058;--mu2:#a09890;--iv:#faf8f4;--bd:#e2d9ce;--gd:#8c6d3f;--wh:#ffffff;--red:#c0392b;--green:#2d6a4f;}
html[data-thema="donker"]{--ink:#f2ede6;--mu:#a89e93;--mu2:#7a7168;--iv:#231f1c;--bd:#3a352f;--gd:#c9a876;--wh:#1a1613;--red:#e57373;--green:#6fbf8f;}
html{transition:background .2s;}
body{font-family:'Inter',sans-serif;background:var(--iv);min-height:100vh;opacity:0;transition:opacity .2s,background .2s,color .2s;}
.topbar{min-height:60px;background:var(--wh);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:10px 24px;position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:10px;row-gap:8px;transition:background .2s,border-color .2s;}
@media(max-width:700px){
  .topbar{padding:10px 14px;}
  .topbar .tabs{order:3;width:100%;justify-content:center;}
}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:var(--ink);}
.logo em{color:var(--gd);font-style:normal;}
.uitloggen{font-size:13px;color:var(--mu);cursor:pointer;background:none;border:none;font-family:inherit;transition:color .15s;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--mu);padding:6px;border-radius:8px;display:flex;align-items:center;transition:background .15s,color .15s;}
.icon-btn:hover{background:var(--iv);color:var(--ink);}
.tab-knop{font-size:13px;font-weight:600;color:var(--mu);cursor:pointer;background:none;border:none;font-family:inherit;padding:8px 14px;border-radius:8px;transition:background .15s,color .15s;}
.tab-knop.actief{background:var(--iv);color:var(--ink);}
.tab-knop:hover:not(.actief){background:var(--iv);}
.layout{display:grid;grid-template-columns:340px 1fr;max-width:1200px;margin:0 auto;min-height:calc(100vh - 60px);}
.lijst{border-right:1px solid var(--bd);background:var(--wh);overflow-y:auto;transition:background .2s,border-color .2s;}
.zoek-wrap{padding:12px 16px;border-bottom:1px solid var(--bd);}
.zoek-input{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;background:var(--iv);color:var(--ink);transition:background .2s,border-color .2s;}
.lijst-item{padding:16px 20px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s;animation:fadeIn .25s ease both;}
.lijst-item:hover{background:var(--iv);}
.lijst-item.actief{background:var(--iv);border-left:3px solid var(--gd);}
.lijst-item.ongelezen .li-van{font-weight:700;}
.li-van{font-size:14px;color:var(--ink);margin-bottom:2px;}
.li-onderwerp{font-size:13px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-datum{font-size:11px;color:var(--mu2);margin-top:4px;}
.li-labels{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.label-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.detail{padding:32px;animation:fadeIn .25s ease both;}
.detail-leeg{padding:60px 32px;text-align:center;color:var(--mu2);font-size:14px;}
.detail-onderwerp{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:var(--ink);margin-bottom:8px;}
.detail-van{font-size:13px;color:var(--mu);margin-bottom:16px;}
.detail-inhoud{font-size:14.5px;color:var(--ink);line-height:1.7;background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:20px;margin-bottom:24px;transition:background .2s,border-color .2s;}
.detail-inhoud p{margin:0 0 10px;}
.rt-toolbar{display:flex;gap:4px;margin-bottom:8px;}
.rt-toolbar button{width:30px;height:30px;border:1px solid var(--bd);background:var(--wh);border-radius:6px;cursor:pointer;font-size:13px;color:var(--ink);transition:background .15s;}
.rt-toolbar button:hover{background:var(--iv);}
.rt-editor{width:100%;min-height:140px;border:1px solid var(--bd);border-radius:10px;padding:14px;font-family:inherit;font-size:14px;background:var(--wh);color:var(--ink);overflow-y:auto;transition:background .2s,border-color .2s;}
.rt-editor:empty:before{content:attr(data-placeholder);color:var(--mu2);}
.rt-editor a{color:var(--gd);}
.btn-reply{margin-top:10px;padding:11px 22px;background:var(--ink);color:var(--wh);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;}
.btn-reply:hover{opacity:.9;}
.btn-reply:active{transform:scale(.98);}
.btn-reply:disabled{opacity:.5;cursor:default;}
.reply-msg{font-size:13px;margin-top:10px;display:none;}
.reply-msg.fout{color:var(--red);}
.reply-msg.ok{color:var(--green);}
.sjabloon-rij{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap;}
.sjabloon-select{font-size:12px;padding:7px 10px;border-radius:6px;border:1px solid var(--bd);font-family:inherit;background:var(--wh);color:var(--ink);}
.label-toggle{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--bd);background:var(--wh);cursor:pointer;font-family:inherit;transition:all .15s;}
.label-toggle.aan{color:var(--wh);}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.skel{background:linear-gradient(90deg,var(--bd) 25%,var(--iv) 50%,var(--bd) 75%);background-size:200% 100%;animation:skelPuls 1.4s ease infinite;border-radius:6px;}
@keyframes skelPuls{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skel-item{padding:16px 20px;border-bottom:1px solid var(--bd);}
.skel-lijn{height:12px;margin-bottom:8px;}
#toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:10px;}
.toast{background:var(--ink);color:var(--wh);padding:12px 18px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.15);animation:toastIn .25s ease both;max-width:320px;}
.toast.fout{background:var(--red);}
.toast.ok{background:var(--green);}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:800px){
  .layout{grid-template-columns:1fr;}
  .lijst{display:none;}
  .lijst.toon-mobiel{display:block;}
  .detail{display:none;}
  .detail.toon-mobiel{display:block;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Kronr<em>.</em></div>
  <div class="tabs" style="display:flex;gap:4px;">
    <button class="tab-knop actief" id="tab-in" onclick="wisselTab('in')">Postvak IN</button>
    <button class="tab-knop" id="tab-uit" onclick="wisselTab('uit')">Postvak UIT</button>
    <button class="tab-knop" id="tab-archief" onclick="wisselTab('archief')">Archief</button>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="/admin/" class="uitloggen" style="text-decoration:none;">Beheer</a>
    <button onclick="toonNieuwBericht()" style="font-size:13px;font-weight:600;color:var(--wh);background:var(--ink);border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;transition:opacity .15s;">+ Nieuw bericht</button>
    <button class="icon-btn" onclick="wisselThema()" id="thema-knop" title="Donkere modus">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3a6 6 0 009 9 9 9 0 11-9-9z"/></svg>
    </button>
    <button class="uitloggen" onclick="toonInstellingen()">Instellingen</button>
    <button class="uitloggen" onclick="uitloggen()">Uitloggen</button>
  </div>
</div>

<div class="layout">
  <div class="lijst toon-mobiel" id="lijst">
    <div class="skel-item"><div class="skel skel-lijn" style="width:60%;"></div><div class="skel skel-lijn" style="width:85%;"></div></div>
    <div class="skel-item"><div class="skel skel-lijn" style="width:50%;"></div><div class="skel skel-lijn" style="width:75%;"></div></div>
    <div class="skel-item"><div class="skel skel-lijn" style="width:65%;"></div><div class="skel skel-lijn" style="width:80%;"></div></div>
  </div>
  <div class="detail" id="detail">
    <div class="detail-leeg">Selecteer een bericht om te lezen.</div>
  </div>
</div>

<!-- Instellingen-scherm -->
<div id="instellingen-overlay" style="display:none;position:fixed;inset:0;background:rgba(15,13,11,.4);z-index:100;align-items:center;justify-content:center;padding:24px;">
  <div style="background:var(--wh);border-radius:14px;padding:28px;max-width:420px;width:100%;">
    <div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:800;color:var(--ink);margin-bottom:16px;">Instellingen</div>
    <label style="font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block;">Jouw naam</label>
    <p style="font-size:12.5px;color:var(--mu);margin-bottom:8px;">Verstuurde mail gebruikt automatisch de Kronr-huisstijl, met "Met vriendelijke groet, [jouw naam], Kronr" onderaan.</p>
    <input type="text" id="naam-tekst" style="width:100%;border:1px solid var(--bd);border-radius:8px;padding:11px 12px;font-family:inherit;font-size:13px;background:var(--wh);color:var(--ink);" placeholder="Bijv. Isaak">

    <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--bd);">
      <label style="font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block;">Sjablonen beheren</label>
      <div id="sjablonen-lijst" style="margin-bottom:10px;"></div>
      <input type="text" id="sj-naam" placeholder="Naam sjabloon" style="width:100%;border:1px solid var(--bd);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:12.5px;margin-bottom:6px;background:var(--wh);color:var(--ink);">
      <textarea id="sj-inhoud" placeholder="Inhoud van het sjabloon..." style="width:100%;min-height:70px;border:1px solid var(--bd);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:12.5px;resize:vertical;background:var(--wh);color:var(--ink);"></textarea>
      <button onclick="voegSjabloonToe()" style="margin-top:8px;padding:9px 14px;background:var(--wh);color:var(--ink);border:1px solid var(--bd);border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;">+ Sjabloon opslaan</button>
    </div>

    <div style="display:flex;gap:10px;margin-top:20px;">
      <button onclick="slaNaamOp()" style="flex:1;padding:11px;background:var(--ink);color:var(--wh);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Opslaan</button>
      <button onclick="sluitInstellingen()" style="padding:11px 18px;background:none;border:1px solid var(--bd);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--ink);">Sluiten</button>
    </div>
    <div class="reply-msg" id="instellingen-msg" style="margin-top:10px;"></div>
  </div>
</div>

<!-- Nieuw bericht -->
<div id="nieuw-bericht-overlay" style="display:none;position:fixed;inset:0;background:rgba(15,13,11,.4);z-index:100;align-items:center;justify-content:center;padding:24px;">
  <div style="background:var(--wh);border-radius:14px;padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;">
    <div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:800;color:var(--ink);margin-bottom:16px;">Nieuw bericht</div>
    <label style="font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block;">Aan</label>
    <input type="email" id="nb-naar" style="width:100%;border:1px solid var(--bd);border-radius:8px;padding:11px 12px;font-family:inherit;font-size:13px;margin-bottom:14px;background:var(--wh);color:var(--ink);" placeholder="naam@voorbeeld.nl">
    <label style="font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block;">Onderwerp</label>
    <input type="text" id="nb-onderwerp" style="width:100%;border:1px solid var(--bd);border-radius:8px;padding:11px 12px;font-family:inherit;font-size:13px;margin-bottom:14px;background:var(--wh);color:var(--ink);">

    <div class="sjabloon-rij">
      <label style="font-size:12px;font-weight:600;color:var(--ink);">Bericht</label>
      <select class="sjabloon-select" id="nb-sjabloon-select" onchange="voegSjabloonInNieuw(this.value)">
        <option value="">Sjabloon invoegen...</option>
      </select>
    </div>
    <div class="rt-toolbar">
      <button type="button" onclick="document.execCommand('bold')"><b>B</b></button>
      <button type="button" onclick="document.execCommand('italic')"><i>I</i></button>
      <button type="button" onclick="voegLinkToe('nb-inhoud')">🔗</button>
    </div>
    <div class="rt-editor" id="nb-inhoud" contenteditable="true" data-placeholder="Typ je bericht..."></div>

    <div style="display:flex;gap:10px;margin-top:14px;">
      <button onclick="verstuurNieuwBericht()" id="nb-btn" class="btn-reply" style="flex:1;margin-top:0;">Versturen</button>
      <button onclick="sluitNieuwBericht()" style="padding:11px 18px;background:none;border:1px solid var(--bd);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--ink);">Annuleren</button>
    </div>
    <div class="reply-msg" id="nb-msg" style="margin-top:10px;"></div>
  </div>
</div>

<div id="toast-wrap"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let sb;
let sbInitMislukt = false;
try{
  if(typeof window.supabase === 'undefined'){
    throw new Error('Supabase-script kon niet geladen worden (mogelijk een netwerk- of adblocker-probleem).');
  }
  sb = window.supabase.createClient('https://pscybcirexnltqvziixt.supabase.co', 'sb_publishable_9cyuoATNMTImTp207rTHaA_sXGi5fm6');
}catch(e){
  sbInitMislukt = true;
  document.body.style.opacity='1';
  document.body.innerHTML='<div style="padding:60px;text-align:center;color:#c0392b;font-size:14px;max-width:500px;margin:0 auto;">'+e.message+'</div>';
}
let BERICHTEN = [];
let VERZONDEN = [];
let SJABLONEN = [];
let HUIDIG_BERICHT_ID = null;
let HUIDIGE_TAB = 'in';
let HUIDIG_TEAMLID = null;
let ZOEKTERM = '';

const LABEL_OPTIES = [
  {naam:'Belangrijk', kleur:'#c0392b'},
  {naam:'Vraag', kleur:'#2d6a4f'},
  {naam:'Opvolgen', kleur:'#8c6d3f'},
];

// ── Toast-meldingen (i.p.v. alert()) ──
function toonToast(bericht, type){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast ' + (type||'');
  el.textContent = bericht;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3200);
}

// ── Donkere modus ──
function wisselThema(){
  const huidig = document.documentElement.getAttribute('data-thema');
  const nieuw = huidig==='donker' ? 'licht' : 'donker';
  if(nieuw==='donker') document.documentElement.setAttribute('data-thema','donker');
  else document.documentElement.removeAttribute('data-thema');
  localStorage.setItem('postvak_thema', nieuw);
}
(function(){
  if(localStorage.getItem('postvak_thema')==='donker'){
    document.documentElement.setAttribute('data-thema','donker');
  }
})();

async function init(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session){ window.location.href = '/postvak-login/'; return; }

    const{data:teamlid,error:teamlidError}=await sb.from('kronr_team').select('id,naam').eq('auth_user_id',session.user.id).maybeSingle();
    if(teamlidError){
      document.body.style.opacity='1';
      document.body.innerHTML='<div style="padding:60px;text-align:center;color:var(--red);font-size:14px;">Kon niet controleren of je toegang hebt: '+teamlidError.message+'</div>';
      return;
    }
    if(!teamlid){
      await sb.auth.signOut();
      window.location.href = '/postvak-login/';
      return;
    }
    HUIDIG_TEAMLID = teamlid;

    document.body.style.opacity='1';
    await laadSjablonen();
    await wisselTab('in');
  }catch(e){
    document.body.style.opacity='1';
    document.body.innerHTML='<div style="padding:60px;text-align:center;color:var(--red);font-size:14px;">Er ging iets mis bij het laden: '+e.message+'</div>';
  }
}

async function laadSjablonen(){
  const{data}=await sb.from('kronr_sjablonen').select('*').order('created_at',{ascending:false});
  SJABLONEN = data||[];
}

function toonSkeletons(){
  document.getElementById('lijst').innerHTML = [1,2,3].map(()=>`
    <div class="skel-item"><div class="skel skel-lijn" style="width:${50+Math.random()*30}%;"></div><div class="skel skel-lijn" style="width:${65+Math.random()*20}%;"></div></div>
  `).join('');
}

async function wisselTab(tab){
  HUIDIGE_TAB = tab;
  document.querySelectorAll('.tab-knop').forEach(t=>t.classList.remove('actief'));
  document.getElementById('tab-'+tab).classList.add('actief');
  document.getElementById('detail').innerHTML='<div class="detail-leeg">Selecteer een bericht om te lezen.</div>';
  HUIDIG_BERICHT_ID = null;
  ZOEKTERM = '';

  document.getElementById('lijst').classList.add('toon-mobiel');
  document.getElementById('detail').classList.remove('toon-mobiel');

  toonSkeletons();

  if(tab==='uit'){
    await laadVerzonden();
  } else {
    await laadBerichten();
  }
}

async function laadBerichten(){
  const gearchiveerd = HUIDIGE_TAB==='archief';
  const{data,error}=await sb.from('kronr_berichten').select('*').eq('gearchiveerd',gearchiveerd).order('ontvangen_op',{ascending:false});
  if(error){
    document.getElementById('lijst').innerHTML='<div style="padding:24px;text-align:center;color:var(--red);font-size:12px;">Kon berichten niet laden.</div>';
    return;
  }
  BERICHTEN = data||[];
  renderLijst();
}

async function laadVerzonden(){
  const{data,error}=await sb.from('kronr_verzonden').select('*').order('verzonden_op',{ascending:false});
  if(error){
    document.getElementById('lijst').innerHTML='<div style="padding:24px;text-align:center;color:var(--red);font-size:12px;">Kon verzonden berichten niet laden.</div>';
    return;
  }
  VERZONDEN = data||[];
  renderLijst();
}

function zetZoekterm(waarde){
  ZOEKTERM = (waarde||'').toLowerCase();
  renderLijst();
}

function renderZoekbalk(){
  return `<div class="zoek-wrap"><input type="text" class="zoek-input" placeholder="Zoeken..." value="${ZOEKTERM.replace(/"/g,'&quot;')}" oninput="zetZoekterm(this.value)"></div>`;
}

function renderLijst(){
  const lijstEl = document.getElementById('lijst');
  const zoekbalkHtml = renderZoekbalk();

  if(HUIDIGE_TAB==='uit'){
    const gefilterd = VERZONDEN.filter(v=>!ZOEKTERM || (v.onderwerp||'').toLowerCase().includes(ZOEKTERM) || (v.naar_email||'').toLowerCase().includes(ZOEKTERM) || (v.inhoud||'').toLowerCase().includes(ZOEKTERM));
    if(!gefilterd.length){
      lijstEl.innerHTML=zoekbalkHtml+`<div style="padding:24px;text-align:center;color:var(--mu2);font-size:12px;">${ZOEKTERM?'Niks gevonden.':'Nog niks verstuurd.'}</div>`;
      return;
    }
    lijstEl.innerHTML = zoekbalkHtml+gefilterd.map(v=>{
      const datum = new Date(v.verzonden_op).toLocaleDateString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      return `
      <div class="lijst-item ${v.id===HUIDIG_BERICHT_ID?'actief':''}" onclick="toonVerzonden('${v.id}')">
        <div class="li-van">Aan: ${v.naar_email}</div>
        <div class="li-onderwerp">${v.onderwerp||'(geen onderwerp)'}</div>
        <div class="li-datum">${datum}</div>
      </div>`;
    }).join('');
    return;
  }

  const gefilterd = BERICHTEN.filter(b=>!ZOEKTERM || (b.onderwerp||'').toLowerCase().includes(ZOEKTERM) || (b.van_email||'').toLowerCase().includes(ZOEKTERM) || (b.van_naam||'').toLowerCase().includes(ZOEKTERM) || (b.inhoud||'').toLowerCase().includes(ZOEKTERM));
  if(!gefilterd.length){
    lijstEl.innerHTML=zoekbalkHtml+`<div style="padding:24px;text-align:center;color:var(--mu2);font-size:12px;">${ZOEKTERM?'Niks gevonden.':(HUIDIGE_TAB==='archief'?'Nog niks gearchiveerd.':'Nog geen berichten.')}</div>`;
    return;
  }
  lijstEl.innerHTML = zoekbalkHtml+gefilterd.map(b=>{
    const datum = new Date(b.ontvangen_op).toLocaleDateString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const labels = (b.labels||[]);
    return `
    <div class="lijst-item ${b.id===HUIDIG_BERICHT_ID?'actief':''} ${!b.gelezen?'ongelezen':''}" onclick="toonBericht('${b.id}')">
      <div class="li-van">${b.van_naam||b.van_email} ${b.beantwoord?'✓':''}</div>
      <div class="li-onderwerp">${b.onderwerp||'(geen onderwerp)'}</div>
      <div class="li-datum">${datum}</div>
      ${labels.length?`<div class="li-labels">${labels.map(l=>{
        const optie = LABEL_OPTIES.find(o=>o.naam===l);
        return `<span class="label-pill" style="background:${optie?optie.kleur:'#999'}22;color:${optie?optie.kleur:'#999'};">${l}</span>`;
      }).join('')}</div>`:''}
    </div>`;
  }).join('');
}

async function toonVerzonden(id){
  HUIDIG_BERICHT_ID = id;
  const bericht = VERZONDEN.find(v=>v.id===id);
  if(!bericht) return;

  document.getElementById('lijst').classList.remove('toon-mobiel');
  document.getElementById('detail').classList.add('toon-mobiel');
  renderLijst();

  const datum = new Date(bericht.verzonden_op).toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
  document.getElementById('detail').innerHTML = `
    <button onclick="terugNaarLijst()" style="background:none;border:none;color:var(--mu);font-size:13px;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;gap:6px;">← Terug naar lijst</button>
    <div class="detail-onderwerp">${bericht.onderwerp||'(geen onderwerp)'}</div>
    <div class="detail-van">Aan <strong>${bericht.naar_email}</strong> · ${datum}</div>
    <div class="detail-inhoud">${bericht.inhoud||''}</div>
  `;
}

function renderLabelToggles(bericht){
  return LABEL_OPTIES.map(o=>{
    const aan = (bericht.labels||[]).includes(o.naam);
    return `<button class="label-toggle ${aan?'aan':''}" style="${aan?`background:${o.kleur};border-color:${o.kleur};`:''}" onclick="wisselLabel('${bericht.id}','${o.naam}')">${o.naam}</button>`;
  }).join('');
}

async function toonBericht(id){
  HUIDIG_BERICHT_ID = id;
  const bericht = BERICHTEN.find(b=>b.id===id);
  if(!bericht) return;

  document.getElementById('lijst').classList.remove('toon-mobiel');
  document.getElementById('detail').classList.add('toon-mobiel');

  renderLijst();

  const sjabloonOpties = SJABLONEN.map(s=>`<option value="${s.id}">${s.naam}</option>`).join('');
  const datum = new Date(bericht.ontvangen_op).toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
  document.getElementById('detail').innerHTML = `
    <button onclick="terugNaarLijst()" style="background:none;border:none;color:var(--mu);font-size:13px;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;gap:6px;">← Terug naar lijst</button>
    <div class="detail-onderwerp">${bericht.onderwerp||'(geen onderwerp)'}</div>
    <div class="detail-van">Van <strong>${bericht.van_naam||bericht.van_email}</strong> (${bericht.van_email}) · ${datum}</div>
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;">${renderLabelToggles(bericht)}</div>
    <div style="display:flex;gap:10px;margin-bottom:16px;">
      <button onclick="wisselBeantwoord('${id}',${!bericht.beantwoord})" style="font-size:12px;padding:7px 12px;border-radius:6px;border:1px solid var(--bd);background:${bericht.beantwoord?'var(--iv)':'var(--wh)'};cursor:pointer;font-family:inherit;color:var(--ink);">${bericht.beantwoord?'✓ Beantwoord':'Markeer als beantwoord'}</button>
      <button onclick="wisselArchief('${id}',${!bericht.gearchiveerd})" style="font-size:12px;padding:7px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--wh);cursor:pointer;font-family:inherit;color:var(--ink);">${bericht.gearchiveerd?'Terugzetten naar Postvak IN':'Archiveren'}</button>
    </div>
    <div class="detail-inhoud">${(bericht.inhoud||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
    <div class="reply-box">
      <div class="sjabloon-rij">
        <label style="font-size:12px;font-weight:600;color:var(--ink);">Antwoorden</label>
        <select class="sjabloon-select" onchange="voegSjabloonInReply(this.value)">
          <option value="">Sjabloon invoegen...</option>
          ${sjabloonOpties}
        </select>
      </div>
      <div class="rt-toolbar">
        <button type="button" onclick="document.execCommand('bold')"><b>B</b></button>
        <button type="button" onclick="document.execCommand('italic')"><i>I</i></button>
        <button type="button" onclick="voegLinkToe('reply-tekst')">🔗</button>
      </div>
      <div class="rt-editor" id="reply-tekst" contenteditable="true" data-placeholder="Typ je antwoord..."></div>
      <button class="btn-reply" id="btn-reply" onclick="verstuurAntwoord()">Antwoord versturen</button>
      <div class="reply-msg" id="reply-msg"></div>
    </div>
  `;

  if(!bericht.gelezen){
    await sb.from('kronr_berichten').update({gelezen:true}).eq('id',id);
    bericht.gelezen = true;
    renderLijst();
  }
}

async function wisselLabel(id, labelNaam){
  const bericht = BERICHTEN.find(b=>b.id===id);
  if(!bericht) return;
  const huidig = bericht.labels||[];
  const nieuw = huidig.includes(labelNaam) ? huidig.filter(l=>l!==labelNaam) : [...huidig, labelNaam];
  const{error}=await sb.from('kronr_berichten').update({labels:nieuw}).eq('id',id);
  if(error){ toonToast('Kon label niet wijzigen: '+error.message,'fout'); return; }
  bericht.labels = nieuw;
  toonBericht(id);
}

function voegSjabloonInReply(sjabloonId){
  if(!sjabloonId) return;
  const sj = SJABLONEN.find(s=>s.id===sjabloonId);
  if(sj) document.getElementById('reply-tekst').innerHTML = sj.inhoud;
}
function voegSjabloonInNieuw(sjabloonId){
  if(!sjabloonId) return;
  const sj = SJABLONEN.find(s=>s.id===sjabloonId);
  if(sj){
    document.getElementById('nb-inhoud').innerHTML = sj.inhoud;
    if(sj.onderwerp) document.getElementById('nb-onderwerp').value = sj.onderwerp;
  }
}

function voegLinkToe(editorId){
  const url = prompt('Link naar (URL):');
  if(url) document.execCommand('createLink', false, url);
  document.getElementById(editorId).focus();
}

async function wisselBeantwoord(id, nieuweStatus){
  await sb.from('kronr_berichten').update({beantwoord:nieuweStatus}).eq('id',id);
  const bericht = BERICHTEN.find(b=>b.id===id);
  if(bericht){ bericht.beantwoord = nieuweStatus; toonBericht(id); }
}

async function wisselArchief(id, nieuweStatus){
  await sb.from('kronr_berichten').update({gearchiveerd:nieuweStatus}).eq('id',id);
  toonToast(nieuweStatus?'Gearchiveerd.':'Teruggezet naar Postvak IN.','ok');
  await laadBerichten();
  document.getElementById('detail').innerHTML='<div class="detail-leeg">Selecteer een bericht om te lezen.</div>';
  document.getElementById('lijst').classList.remove('toon-mobiel');
  document.getElementById('detail').classList.add('toon-mobiel');
}

function terugNaarLijst(){
  document.getElementById('lijst').classList.add('toon-mobiel');
  document.getElementById('detail').classList.remove('toon-mobiel');
}

async function verstuurAntwoord(){
  const editor = document.getElementById('reply-tekst');
  const tekst = editor.innerHTML.trim();
  const msgEl = document.getElementById('reply-msg');
  if(!tekst){
    msgEl.textContent='Vul een antwoord in.';
    msgEl.className='reply-msg fout';
    msgEl.style.display='block';
    return;
  }

  const bericht = BERICHTEN.find(b=>b.id===HUIDIG_BERICHT_ID);
  const btn = document.getElementById('btn-reply');
  btn.disabled=true;btn.textContent='Versturen...';

  const{data:{session}}=await sb.auth.getSession();

  try{
    const res = await fetch('https://kronr-postvak.isaak-elia.workers.dev/versturen',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        naar: bericht.van_email,
        onderwerp: 'Re: '+(bericht.onderwerp||''),
        inhoud: tekst,
        thread_id: bericht.id,
        sessie_token: session.access_token,
      })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Versturen mislukt');

    bericht.beantwoord = true;
    toonToast('Antwoord verstuurd!','ok');
    editor.innerHTML='';
    renderLijst();
  }catch(e){
    toonToast('Fout: '+e.message,'fout');
  }

  btn.disabled=false;btn.textContent='Antwoord versturen';
}

function toonInstellingen(){
  document.getElementById('naam-tekst').value = HUIDIG_TEAMLID?.naam || '';
  document.getElementById('instellingen-msg').style.display='none';
  renderSjablonenLijst();
  document.getElementById('instellingen-overlay').style.display='flex';
}
function sluitInstellingen(){
  document.getElementById('instellingen-overlay').style.display='none';
}
async function slaNaamOp(){
  const naam = document.getElementById('naam-tekst').value.trim();
  const msgEl = document.getElementById('instellingen-msg');
  const{error}=await sb.from('kronr_team').update({naam:naam||null}).eq('id',HUIDIG_TEAMLID.id);
  if(error){
    msgEl.textContent='Fout: '+error.message;
    msgEl.className='reply-msg fout';
  } else {
    HUIDIG_TEAMLID.naam = naam;
    msgEl.textContent='Opgeslagen.';
    msgEl.className='reply-msg ok';
  }
  msgEl.style.display='block';
}

function renderSjablonenLijst(){
  const el = document.getElementById('sjablonen-lijst');
  if(!SJABLONEN.length){
    el.innerHTML = '<div style="font-size:12px;color:var(--mu2);">Nog geen sjablonen.</div>';
    return;
  }
  el.innerHTML = SJABLONEN.map(s=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);font-size:12.5px;">
      <span>${s.naam}</span>
      <button onclick="verwijderSjabloon('${s.id}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;font-family:inherit;">Verwijderen</button>
    </div>
  `).join('');
}

async function voegSjabloonToe(){
  const naam = document.getElementById('sj-naam').value.trim();
  const inhoud = document.getElementById('sj-inhoud').value.trim();
  if(!naam||!inhoud){ toonToast('Vul naam en inhoud in.','fout'); return; }
  const{error}=await sb.from('kronr_sjablonen').insert({naam, inhoud});
  if(error){ toonToast('Kon sjabloon niet opslaan: '+error.message,'fout'); return; }
  document.getElementById('sj-naam').value='';
  document.getElementById('sj-inhoud').value='';
  await laadSjablonen();
  renderSjablonenLijst();
  toonToast('Sjabloon opgeslagen.','ok');
}

async function verwijderSjabloon(id){
  const{error}=await sb.from('kronr_sjablonen').delete().eq('id',id);
  if(error){ toonToast('Kon niet verwijderen: '+error.message,'fout'); return; }
  await laadSjablonen();
  renderSjablonenLijst();
}

function toonNieuwBericht(){
  document.getElementById('nb-naar').value='';
  document.getElementById('nb-onderwerp').value='';
  document.getElementById('nb-inhoud').innerHTML='';
  document.getElementById('nb-msg').style.display='none';
  const select = document.getElementById('nb-sjabloon-select');
  select.innerHTML = '<option value="">Sjabloon invoegen...</option>' + SJABLONEN.map(s=>`<option value="${s.id}">${s.naam}</option>`).join('');
  document.getElementById('nieuw-bericht-overlay').style.display='flex';
}
function sluitNieuwBericht(){
  document.getElementById('nieuw-bericht-overlay').style.display='none';
}
async function verstuurNieuwBericht(){
  const naar = document.getElementById('nb-naar').value.trim();
  const onderwerp = document.getElementById('nb-onderwerp').value.trim();
  const inhoud = document.getElementById('nb-inhoud').innerHTML.trim();
  const msgEl = document.getElementById('nb-msg');

  if(!naar||!onderwerp||!inhoud){
    msgEl.textContent='Vul alle velden in.';
    msgEl.className='reply-msg fout';
    msgEl.style.display='block';
    return;
  }

  const btn=document.getElementById('nb-btn');
  btn.disabled=true;btn.textContent='Versturen...';

  const{data:{session}}=await sb.auth.getSession();

  try{
    const res = await fetch('https://kronr-postvak.isaak-elia.workers.dev/versturen',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ naar, onderwerp, inhoud, sessie_token: session.access_token })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Versturen mislukt');

    toonToast('Verstuurd!','ok');
    setTimeout(()=>{ sluitNieuwBericht(); if(HUIDIGE_TAB==='uit') laadVerzonden(); }, 500);
  }catch(e){
    msgEl.textContent='Fout: '+e.message;
    msgEl.className='reply-msg fout';
    msgEl.style.display='block';
  }

  btn.disabled=false;btn.textContent='Versturen';
}

async function uitloggen(){
  await sb.auth.signOut();
  window.location.href = '/postvak-login/';
}

// Vangnet: als er ook maar iets misgaat vóórdat init() de kans krijgt
// om de pagina zichtbaar te maken, moet de pagina na een paar seconden
// hoe dan ook zichtbaar worden met een duidelijke melding -- nooit
// voor altijd wit blijven.
setTimeout(()=>{
  if(document.body.style.opacity!=='1'){
    document.body.style.opacity='1';
    document.body.innerHTML='<div style="padding:60px;text-align:center;color:#c0392b;font-size:14px;max-width:500px;margin:0 auto;">De pagina kon niet laden. Dit kan komen doordat een script (bijv. de Supabase-verbinding) niet is geladen. Probeer de pagina te verversen (evt. met een nieuw tabblad of hard-refresh), of neem contact op als dit blijft gebeuren.</div>';
  }
},4000);

if(!sbInitMislukt) init();
</script>
</body>
</html>
