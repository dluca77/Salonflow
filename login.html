<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planr — Inloggen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#252525;--accent:#c8f060;--accent2:#a0d040;--text:#f0ede8;--muted:#888;--red:#ff6b6b;--green:#4dff90;}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

.logo{font-family:'DM Serif Display',serif;font-size:28px;letter-spacing:-0.5px;text-align:center;margin-bottom:8px;}
.logo span{color:var(--accent);}
.tagline{font-size:13px;color:var(--muted);text-align:center;margin-bottom:36px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:400px;}

.tabs{display:flex;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:28px;gap:3px;}
.tab{flex:1;padding:9px;text-align:center;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;transition:all 0.15s;color:var(--muted);border:none;background:transparent;font-family:'DM Sans',sans-serif;}
.tab.active{background:var(--surface);color:var(--text);}

.form-row{margin-bottom:16px;}
.form-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;font-size:15px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;-webkit-appearance:none;}
.form-input:focus{border-color:var(--accent);}
.form-input.error{border-color:var(--red);}

.select-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;font-size:15px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;appearance:none;cursor:pointer;}

.btn{width:100%;padding:15px;background:var(--accent);color:#1a1a1a;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover{background:var(--accent2);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:12px;color:var(--muted);}

.btn-google{width:100%;padding:13px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-google:hover{border-color:var(--muted);}

.msg{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;}
.msg.error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--red);display:block;}
.msg.success{background:rgba(77,255,144,0.1);border:1px solid rgba(77,255,144,0.3);color:var(--green);display:block;}

.forgot{text-align:right;margin-top:-10px;margin-bottom:16px;}
.forgot a{font-size:12px;color:var(--muted);text-decoration:none;}
.forgot a:hover{color:var(--text);}

.terms{font-size:12px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.5;}
.terms a{color:var(--accent);text-decoration:none;}

.back-home{display:block;text-align:center;margin-top:24px;font-size:13px;color:var(--muted);text-decoration:none;}
.back-home:hover{color:var(--text);}

/* Loading spinner */
.spinner{width:18px;height:18px;border:2px solid rgba(26,26,26,0.3);border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Onboarding step (na registratie) */
.onboarding{display:none;}
.onboarding.show{display:block;}
.login-form{display:block;}
.login-form.hide{display:none;}
</style>
</head>
<body>

<div class="logo">Planr<span>.</span></div>
<div class="tagline">Slimmer plannen voor jouw bedrijf</div>

<div class="card">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="setTab('login')">Inloggen</button>
    <button class="tab" onclick="setTab('register')">Account aanmaken</button>
  </div>

  <!-- Foutmelding -->
  <div class="msg" id="msg"></div>

  <!-- Login form -->
  <div id="login-form">
    <div class="form-row">
      <div class="form-label">E-mailadres</div>
      <input class="form-input" type="email" id="login-email" placeholder="jij@bedrijf.nl" autocomplete="email">
    </div>
    <div class="form-row">
      <div class="form-label">Wachtwoord</div>
      <input class="form-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="forgot"><a href="#" onclick="resetPassword()">Wachtwoord vergeten?</a></div>
    <button class="btn" id="login-btn" onclick="login()">Inloggen</button>

    <div class="divider"><div class="divider-line"></div><div class="divider-text">of</div><div class="divider-line"></div></div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Doorgaan met Google
    </button>
  </div>

  <!-- Register form -->
  <div id="register" style="display:none"><div id="register-form" style="display:none">
    <div class="form-row">
      <div class="form-label">Naam van je bedrijf</div>
      <input class="form-input" type="text" id="reg-naam" placeholder="bijv. Beauty Studio Mila" autocomplete="organization">
    </div>
    <div class="form-row">
      <div class="form-label">Type bedrijf</div>
      <select class="select-input" id="reg-type">
        <option value="Kapper">Kapper / Barbier</option>
        <option value="Nagelstudio">Nagelstudio</option>
        <option value="Spa">Spa & Wellness</option>
        <option value="Hondentrimsalon">Hondentrimsalon</option>
        <option value="Schoonheidssalon">Schoonheidssalon</option>
        <option value="Personal trainer">Personal trainer</option>
        <option value="Tattoo">Tattoo & Piercing</option>
        <option value="Yoga">Yoga & Fitness</option>
        <option value="Tandarts">Tandarts / Zorg</option>
        <option value="Massage">Massagepraktijk</option>
        <option value="Anders">Anders</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-label">E-mailadres</div>
      <input class="form-input" type="email" id="reg-email" placeholder="jij@bedrijf.nl" autocomplete="email">
    </div>
    <div class="form-row">
      <div class="form-label">Wachtwoord</div>
      <input class="form-input" type="password" id="reg-pass" placeholder="Minimaal 8 tekens" autocomplete="new-password">
    </div>
    <button class="btn" id="register-btn" onclick="register()">Gratis account aanmaken →</button>
    <div class="terms">Door te registreren ga je akkoord met onze <a href="#">voorwaarden</a> en <a href="#">privacybeleid</a>.</div>
  </div>
</div>

<a href="dashboard.html" class="back-home">← Terug naar Planr.nl</a>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════
// CONFIGURATIE — VUL DIT IN
// Haal deze waarden op uit: Supabase > Project Settings > API
// ═══════════════════════════════════════
const SUPABASE_URL = 'JOUW_SUPABASE_URL_HIER';
const SUPABASE_ANON_KEY = 'JOUW_ANON_KEY_HIER';
// ═══════════════════════════════════════

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Check al ingelogd
supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'index.html';
});

function setTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  clearMsg();
}

function showMsg(text, type='error') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type}`;
}
function clearMsg() {
  document.getElementById('msg').className = 'msg';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<div class="spinner"></div>'
    : btnId === 'login-btn' ? 'Inloggen' : 'Gratis account aanmaken →';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) return showMsg('Vul je e-mailadres en wachtwoord in.');
  setLoading('login-btn', true);
  clearMsg();
  const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) {
    showMsg('Inloggen mislukt. Controleer je e-mailadres en wachtwoord.');
    setLoading('login-btn', false);
  } else {
    window.location.href = 'index.html';
  }
}

async function register() {
  const naam = document.getElementById('reg-naam').value.trim();
  const type = document.getElementById('reg-type').value;
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if (!naam || !email || !pass) return showMsg('Vul alle velden in.');
  if (pass.length < 8) return showMsg('Wachtwoord moet minimaal 8 tekens zijn.');
  setLoading('register-btn', true);
  clearMsg();

  // Account aanmaken
  const { data, error } = await supabase.auth.signUp({
    email,
    password: pass,
    options: { data: { bedrijf_naam: naam, type_bedrijf: type } }
  });

  if (error) {
    showMsg('Registratie mislukt: ' + error.message);
    setLoading('register-btn', false);
    return;
  }

  // Salon aanmaken in database
  if (data.user) {
    await supabase.from('salons').insert({
      owner_id: data.user.id,
      naam,
      type_bedrijf: type,
      email,
      plan: 'free'
    });
  }

  showMsg('Account aangemaakt! Controleer je e-mail om te bevestigen, dan kun je inloggen.', 'success');
  setLoading('register-btn', false);
}

async function loginGoogle() {
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/index.html' }
  });
}

async function resetPassword() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) return showMsg('Vul eerst je e-mailadres in.');
  await supabase.auth.resetPasswordForEmail(email);
  showMsg('Reset-link verstuurd! Controleer je e-mail.', 'success');
}

// Auto-switch to register tab if URL has #register
if (window.location.hash === '#register') {
  setTab('register');
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginVisible = document.getElementById('login-form').style.display !== 'none';
  if (loginVisible) login(); else register();
});
</script>
</body>
</html>
