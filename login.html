<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planr — Inloggen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0a;--surface:#141414;--s2:#1e1e1e;--border:#2a2a2a;
  --accent:#c8f060;--accent2:#a0d040;--text:#f0ede8;--muted:#888;
  --red:#ff6b6b;--green:#4dff90;
}
html,body{
  background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px 16px;
}

.logo{font-family:'DM Serif Display',serif;font-size:30px;letter-spacing:-0.5px;text-align:center;margin-bottom:6px;}
.logo span{color:var(--accent);}
.tagline{font-size:13px;color:var(--muted);text-align:center;margin-bottom:32px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:400px;}

/* TABS */
.tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--s2);border-radius:10px;padding:3px;margin-bottom:24px;}
.tab{
  padding:10px;text-align:center;font-size:14px;font-weight:500;
  border-radius:8px;cursor:pointer;color:var(--muted);
  border:none;background:transparent;font-family:'DM Sans',sans-serif;
  transition:all 0.15s;
}
.tab.active{background:var(--surface);color:var(--text);}

/* FORMS */
.form-section{display:none;}
.form-section.visible{display:block;}

.frow{margin-bottom:14px;}
.flabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;display:block;}
.finput{
  width:100%;background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:13px 14px;font-size:15px;color:var(--text);
  font-family:'DM Sans',sans-serif;outline:none;
  transition:border-color 0.15s;-webkit-appearance:none;appearance:none;
}
.finput:focus{border-color:var(--accent);}
select.finput{cursor:pointer;}

/* BUTTONS */
.btn-main{
  width:100%;padding:15px;background:var(--accent);color:#1a1a1a;
  border:none;border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s;
  margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-main:hover{background:var(--accent2);}
.btn-main:disabled{opacity:0.5;cursor:not-allowed;}

.btn-google{
  width:100%;padding:13px;background:var(--s2);color:var(--text);
  border:1px solid var(--border);border-radius:12px;font-size:14px;font-weight:500;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:border-color 0.15s;margin-top:10px;
}
.btn-google:hover{border-color:var(--muted);}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:18px 0 4px;}
.dline{flex:1;height:1px;background:var(--border);}
.dtxt{font-size:12px;color:var(--muted);}

/* MESSAGES */
.msg{
  padding:12px 14px;border-radius:10px;font-size:13px;
  margin-bottom:16px;line-height:1.5;display:none;
}
.msg.err{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--red);display:block;}
.msg.ok{background:rgba(77,255,144,0.1);border:1px solid rgba(77,255,144,0.3);color:var(--green);display:block;}

/* EXTRAS */
.forgot{text-align:right;margin:-8px 0 14px;}
.forgot a{font-size:12px;color:var(--muted);text-decoration:none;}
.terms{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5;}
.terms a{color:var(--accent);text-decoration:none;}
.back{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--muted);text-decoration:none;}
.back:hover{color:var(--text);}

.spinner{width:18px;height:18px;border:2px solid rgba(26,26,26,0.3);border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="logo">Planr<span>.</span></div>
<div class="tagline">Slimmer plannen voor jouw bedrijf</div>

<div class="card">

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="toonLogin()">Inloggen</button>
    <button class="tab" id="tab-reg" onclick="toonRegistreer()">Account aanmaken</button>
  </div>

  <div class="msg" id="msg"></div>

  <!-- ── LOGIN ── -->
  <div class="form-section visible" id="sectie-login">
    <div class="frow">
      <label class="flabel">E-mailadres</label>
      <input class="finput" type="email" id="l-email" placeholder="jij@bedrijf.nl" autocomplete="email">
    </div>
    <div class="frow">
      <label class="flabel">Wachtwoord</label>
      <input class="finput" type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="forgot"><a href="#" onclick="resetWw(event)">Wachtwoord vergeten?</a></div>
    <button class="btn-main" id="btn-login" onclick="login()">Inloggen</button>
    <div class="divider"><div class="dline"></div><div class="dtxt">of</div><div class="dline"></div></div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Doorgaan met Google
    </button>
  </div>

  <!-- ── REGISTREREN ── -->
  <div class="form-section" id="sectie-reg">
    <div class="frow">
      <label class="flabel">Naam van je bedrijf</label>
      <input class="finput" type="text" id="r-naam" placeholder="bijv. Beauty Studio Mila" autocomplete="organization">
    </div>
    <div class="frow">
      <label class="flabel">Type bedrijf</label>
      <select class="finput" id="r-type">
        <option value="Kapper">Kapper / Barbier</option>
        <option value="Nagelstudio">Nagelstudio</option>
        <option value="Spa">Spa & Wellness</option>
        <option value="Hondentrimsalon">Hondentrimsalon</option>
        <option value="Schoonheidssalon">Schoonheidssalon</option>
        <option value="Personal trainer">Personal trainer</option>
        <option value="Tattoo">Tattoo & Piercing</option>
        <option value="Yoga">Yoga & Fitness</option>
        <option value="Tandarts">Tandarts / Zorg</option>
        <option value="Massage">Massagepraktijk</option>
        <option value="Anders">Anders</option>
      </select>
    </div>
    <div class="frow">
      <label class="flabel">E-mailadres</label>
      <input class="finput" type="email" id="r-email" placeholder="jij@bedrijf.nl" autocomplete="email">
    </div>
    <div class="frow">
      <label class="flabel">Wachtwoord</label>
      <input class="finput" type="password" id="r-pass" placeholder="Minimaal 8 tekens" autocomplete="new-password">
    </div>
    <button class="btn-main" id="btn-reg" onclick="registreer()">Gratis account aanmaken →</button>
    <div class="terms">Door te registreren ga je akkoord met onze <a href="#">voorwaarden</a> en <a href="#">privacybeleid</a>.</div>
  </div>

</div>

<a href="index.html" class="back">← Terug naar Planr.nl</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://pscybcirexnltqvziixt.supabase.co';
const SB_KEY = 'sb_publishable_9cyuoATNMTImTp207rTHaA_sXGi5fm6';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

// Als al ingelogd en niet bewust naar login genagiveerd -> door naar dashboard
const vanHomepage = document.referrer.includes('index.html') || document.referrer === '';
sb.auth.getSession().then(({ data: { session } }) => {
  if (session && !vanHomepage) window.location.href = 'dashboard.html';
});

// ── TAB WISSELEN ──
function toonLogin() {
  document.getElementById('sectie-login').classList.add('visible');
  document.getElementById('sectie-reg').classList.remove('visible');
  document.getElementById('tab-login').classList.add('active');
  document.getElementById('tab-reg').classList.remove('active');
  leegMsg();
}

function toonRegistreer() {
  document.getElementById('sectie-reg').classList.add('visible');
  document.getElementById('sectie-login').classList.remove('visible');
  document.getElementById('tab-reg').classList.add('active');
  document.getElementById('tab-login').classList.remove('active');
  leegMsg();
}

// ── BERICHTEN ──
function toonMsg(tekst, type) {
  const el = document.getElementById('msg');
  el.textContent = tekst;
  el.className = 'msg ' + (type === 'ok' ? 'ok' : 'err');
}
function leegMsg() {
  const el = document.getElementById('msg');
  el.className = 'msg';
  el.textContent = '';
}

// ── LADEN ──
function setLaden(btnId, laden, label) {
  const btn = document.getElementById(btnId);
  btn.disabled = laden;
  btn.innerHTML = laden ? '<div class="spinner"></div>' : label;
}

// ── INLOGGEN ──
async function login() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  if (!email || !pass) return toonMsg('Vul je e-mailadres en wachtwoord in.');
  setLaden('btn-login', true, 'Inloggen');
  leegMsg();
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    toonMsg('Inloggen mislukt. Controleer je gegevens.');
    setLaden('btn-login', false, 'Inloggen');
  } else {
    window.location.href = 'dashboard.html';
  }
}

// ── REGISTREREN ──
async function registreer() {
  const naam  = document.getElementById('r-naam').value.trim();
  const type  = document.getElementById('r-type').value;
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-pass').value;

  if (!naam)  return toonMsg('Vul de naam van je bedrijf in.');
  if (!email) return toonMsg('Vul je e-mailadres in.');
  if (!pass)  return toonMsg('Vul een wachtwoord in.');
  if (pass.length < 8) return toonMsg('Wachtwoord moet minimaal 8 tekens zijn.');

  setLaden('btn-reg', true, 'Gratis account aanmaken →');
  leegMsg();

  const { data, error } = await sb.auth.signUp({
    email,
    password: pass,
    options: { data: { bedrijf_naam: naam, type_bedrijf: type } }
  });

  if (error) {
    toonMsg('Registratie mislukt: ' + error.message);
    setLaden('btn-reg', false, 'Gratis account aanmaken →');
    return;
  }

  // Salon aanmaken in database
  if (data.user) {
    await sb.from('salons').insert({
      owner_id: data.user.id,
      naam,
      type_bedrijf: type,
      email,
      plan: 'free'
    });
  }

  toonMsg('Account aangemaakt! Check je e-mail om te bevestigen.', 'ok');
  setLaden('btn-reg', false, 'Gratis account aanmaken →');
}

// ── GOOGLE LOGIN ──
async function loginGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
}

// ── WACHTWOORD RESET ──
async function resetWw(e) {
  e.preventDefault();
  const email = document.getElementById('l-email').value.trim();
  if (!email) return toonMsg('Vul eerst je e-mailadres in.');
  await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });
  toonMsg('Reset-link verstuurd! Check je e-mail.', 'ok');
}

// ── ENTER TOETS ──
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('sectie-login').classList.contains('visible')) login();
  else registreer();
});

// ── URL HASH: login.html#registreer ──
if (window.location.hash === '#registreer' || window.location.hash === '#register') {
  toonRegistreer();
}
</script>
</body>
</html>
